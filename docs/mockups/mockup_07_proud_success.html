<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1920, initial-scale=1.0">
    <title>Mockup 07: Proud Success State - OwlWatcher</title>
    <style>
        /* MOCKUP 07: PROUD SUCCESS STATE
           Theme: Gold celebration with confetti particles, proud owl pose,
           achievement badge, success banner, fireworks */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            width: 1920px; height: 1080px;
            overflow: hidden;
            background: radial-gradient(ellipse at center, #1a1510 0%, #0f0a05 60%, #000000 100%);
        }

        /* Gold radial glow */
        .success-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, rgba(251, 191, 36, 0.3) 0%, transparent 70%);
            transform: translate(-50%, -50%);
            animation: success-pulse 2s ease-in-out infinite;
            z-index: 1;
        }
        @keyframes success-pulse {
            0%, 100% { opacity: 0.6; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
        }

        /* Proud owl (chest puffed) */
        .owl-proud {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 256px;
            height: 256px;
            font-size: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: owl-proud-bounce 1s ease-in-out infinite;
            z-index: 100;
            filter: drop-shadow(0 0 50px rgba(251, 191, 36, 0.9));
        }
        @keyframes owl-proud-bounce {
            0%, 100% { transform: translate(-50%, -50%) scale(1) rotate(0deg); }
            50% { transform: translate(-50%, -50%) scale(1.05) rotate(2deg); }
        }
        .owl-proud::before {
            content: '🦉';
        }

        /* Gold confetti particles */
        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%);
            animation: confetti-fall 3s ease-out infinite;
            z-index: 150;
        }
        @keyframes confetti-fall {
            0% {
                transform: translateY(-100px) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(1200px) rotate(720deg);
                opacity: 0;
            }
        }
        .confetti:nth-child(1) { left: 10%; animation-delay: 0s; }
        .confetti:nth-child(2) { left: 20%; animation-delay: 0.3s; background: #34d399; }
        .confetti:nth-child(3) { left: 30%; animation-delay: 0.6s; }
        .confetti:nth-child(4) { left: 40%; animation-delay: 0.9s; background: #60a5fa; }
        .confetti:nth-child(5) { left: 50%; animation-delay: 1.2s; }
        .confetti:nth-child(6) { left: 60%; animation-delay: 1.5s; background: #f472b6; }
        .confetti:nth-child(7) { left: 70%; animation-delay: 1.8s; }
        .confetti:nth-child(8) { left: 80%; animation-delay: 2.1s; background: #a78bfa; }
        .confetti:nth-child(9) { left: 90%; animation-delay: 2.4s; }

        /* Achievement badge */
        .achievement-badge {
            position: absolute;
            top: 20%;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 120px;
            background: radial-gradient(circle, rgba(251, 191, 36, 0.4) 0%, transparent 70%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 64px;
            animation: badge-spin 10s linear infinite;
            z-index: 90;
            filter: drop-shadow(0 0 30px rgba(251, 191, 36, 0.8));
        }
        @keyframes badge-spin {
            from { transform: translateX(-50%) rotate(0deg); }
            to { transform: translateX(-50%) rotate(360deg); }
        }
        .achievement-badge::before {
            content: '🏆';
        }

        /* Success banner */
        .success-banner {
            position: absolute;
            top: 70%;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            z-index: 120;
            animation: banner-slide-in 1s ease-out forwards;
        }
        @keyframes banner-slide-in {
            from {
                transform: translateX(-50%) translateY(100px);
                opacity: 0;
            }
            to {
                transform: translateX(-50%) translateY(0);
                opacity: 1;
            }
        }
        .success-banner h1 {
            font-size: 48px;
            color: #fbbf24;
            text-transform: uppercase;
            letter-spacing: 4px;
            font-weight: 700;
            text-shadow: 0 0 30px rgba(251, 191, 36, 0.9);
            animation: text-glow 1.5s ease-in-out infinite;
        }
        @keyframes text-glow {
            0%, 100% { text-shadow: 0 0 30px rgba(251, 191, 36, 0.9); }
            50% { text-shadow: 0 0 50px rgba(251, 191, 36, 1); }
        }
        .success-banner p {
            margin-top: 15px;
            font-size: 20px;
            color: rgba(255, 255, 255, 0.8);
        }

        /* Firework burst */
        .firework {
            position: absolute;
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: radial-gradient(circle, #fbbf24 0%, transparent 70%);
            animation: firework-burst 2s ease-out infinite;
        }
        @keyframes firework-burst {
            0% {
                transform: scale(0) translate(0, 0);
                opacity: 1;
            }
            100% {
                transform: scale(20) translate(var(--burst-x), var(--burst-y));
                opacity: 0;
            }
        }
        .firework:nth-child(1) { top: 30%; left: 20%; --burst-x: 50px; --burst-y: -50px; animation-delay: 0s; }
        .firework:nth-child(2) { top: 25%; left: 80%; --burst-x: -60px; --burst-y: -40px; animation-delay: 0.5s; }
        .firework:nth-child(3) { top: 60%; left: 10%; --burst-x: 40px; --burst-y: 30px; animation-delay: 1s; }
        .firework:nth-child(4) { top: 55%; left: 85%; --burst-x: -50px; --burst-y: 40px; animation-delay: 1.5s; }

        .annotation {
            position: absolute;
            padding: 8px 16px;
            font-size: 12px;
            font-weight: 600;
            border-radius: 6px;
            background: rgba(251, 146, 60, 0.95);
            color: white;
            border: 2px solid rgba(251, 146, 60, 1);
            z-index: 200;
            font-family: 'Courier New', monospace;
        }
    </style>
</head>
<body>
    <div class="success-glow"></div>
    <div class="owl-proud"></div>
    <div class="achievement-badge"></div>

    <div class="confetti"></div>
    <div class="confetti"></div>
    <div class="confetti"></div>
    <div class="confetti"></div>
    <div class="confetti"></div>
    <div class="confetti"></div>
    <div class="confetti"></div>
    <div class="confetti"></div>
    <div class="confetti"></div>

    <div class="firework"></div>
    <div class="firework"></div>
    <div class="firework"></div>
    <div class="firework"></div>

    <div class="success-banner">
        <h1>✨ ALL FILES SYNCED ✨</h1>
        <p>1,247 files • 0 conflicts • 100% success rate</p>
    </div>

    <div class="annotation" style="top: 20px; left: 20px;">
        SPLINE 3D<br>Proud Owl + Trophy Badge<br>Confetti + Fireworks
    </div>
</body>
</html>

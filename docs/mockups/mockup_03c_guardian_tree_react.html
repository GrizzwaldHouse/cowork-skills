<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OwlWatcher - Guardian Tree (React + AI Art + Spline 3D)</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide-react@0.344.0/dist/umd/lucide-react.min.js"></script>
    <!-- Spline 3D Viewer Web Component -->
    <script type="module" src="https://unpkg.com/@splinetool/viewer@1.9.82/build/spline-viewer.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #000; }

        @keyframes dash {
            to { stroke-dashoffset: -1000; }
        }
        @keyframes sweep {
            0% { transform: translateX(-50%) rotate(-45deg); opacity: 0; }
            50% { opacity: 0.8; }
            100% { transform: translateX(-50%) rotate(45deg); opacity: 0; }
        }
        @keyframes float {
            0% { transform: translateY(0px) translateX(0px); }
            50% { transform: translateY(-15px) translateX(10px); }
            100% { transform: translateY(0px) translateX(0px); }
        }
        @keyframes fall {
            0% { transform: translateY(-10vh) translateX(0) rotate(0deg); }
            100% { transform: translateY(110vh) translateX(50px) rotate(360deg); }
        }
        @keyframes swing {
            0% { transform: rotate(-10deg); }
            100% { transform: rotate(10deg); }
        }
        @keyframes hovering {
            0% { transform: translateY(-5px); }
            100% { transform: translateY(5px); }
        }
        @keyframes peck {
            0%, 100% { transform: rotate(0deg) translateY(0); }
            50% { transform: rotate(20deg) translateY(20px); }
        }
        @keyframes explode {
            0% { opacity: 1; }
            100% { opacity: 0; }
        }
        @keyframes shoot {
            0% { transform: translateY(0); }
            100% { transform: translateY(-60px); }
        }
        @keyframes pulse {
            0% { opacity: 0.3; }
            100% { opacity: 1; }
        }
        @keyframes scanBeamSweep {
            0%, 100% { transform: translateX(-50%) rotate(-40deg); }
            50% { transform: translateX(-50%) rotate(40deg); }
        }
        @keyframes fogDrift {
            0% { transform: translateX(-20%); }
            100% { transform: translateX(20%); }
        }
        @keyframes fogDriftReverse {
            0% { transform: translateX(15%); }
            100% { transform: translateX(-25%); }
        }
        @keyframes dustFloat {
            0% { transform: translate(0, 0) scale(1); opacity: 0; }
            20% { opacity: 0.4; }
            80% { opacity: 0.3; }
            100% { transform: translate(30px, -40px) scale(0.5); opacity: 0; }
        }
        @keyframes volumetricSway {
            0%, 100% { transform: rotate(-2deg) scaleX(0.95); }
            50% { transform: rotate(2deg) scaleX(1.05); }
        }
        @keyframes breathe3d {
            0%, 100% { transform: translateZ(0px) scale(1); }
            50% { transform: translateZ(10px) scale(1.02); }
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Destructure Lucide icons from global
        const LucideIcons = window.lucideReact || {};
        const FileText = LucideIcons.FileText || (() => <span>📄</span>);
        const Code = LucideIcons.Code || (() => <span>🐍</span>);
        const Settings = LucideIcons.Settings || (() => <span>⚙️</span>);
        const Database = LucideIcons.Database || (() => <span>📊</span>);
        const Shield = LucideIcons.Shield || (() => <span>🔒</span>);
        const Archive = LucideIcons.Archive || (() => <span>📦</span>);
        const PenTool = LucideIcons.PenTool || (() => <span>🎨</span>);
        const Activity = LucideIcons.Activity || (() => <span>⚡</span>);
        const Clipboard = LucideIcons.Clipboard || (() => <span>📝</span>);
        const Wrench = LucideIcons.Wrench || (() => <span>🔧</span>);
        const BookOpen = LucideIcons.BookOpen || (() => <span>📚</span>);
        const Bug = LucideIcons.Bug || (() => <span>🐛</span>);

        const OwlWatcher = () => {
            const [state, setState] = useState('IDLE');
            const [catching, setCatching] = useState(null);
            const [mousePos, setMousePos] = useState({ x: 0, y: 0 });
            const [interactionStep, setInteractionStep] = useState(0);

            const seasons = {
                IDLE: {
                    name: 'Summer Night',
                    accent: '#4FD1C5',
                    eyeColor: '#4FD1C5',
                    eyeGlow: '#4FD1C5',
                    moon: '#FBBF24',
                    bgOverlay: 'rgba(0,0,0,0)',
                    vignetteColor: 'transparent'
                },
                SCANNING: {
                    name: 'Autumn Scan',
                    accent: '#FB923C',
                    eyeColor: '#FFD700',
                    eyeGlow: '#FBBF24',
                    moon: '#f97316',
                    bgOverlay: 'rgba(100,50,0,0.25)',
                    vignetteColor: 'transparent'
                },
                ALERT: {
                    name: 'Winter Storm',
                    accent: '#EF4444',
                    eyeColor: '#FF1A1A',
                    eyeGlow: '#EF4444',
                    moon: '#fee2e2',
                    bgOverlay: 'rgba(80,0,0,0.35)',
                    vignetteColor: 'rgba(239,68,68,0.25)'
                },
                SUCCESS: {
                    name: 'Spring Bloom',
                    accent: '#F59E0B',
                    eyeColor: '#FFB800',
                    eyeGlow: '#F59E0B',
                    moon: '#fef3c7',
                    bgOverlay: 'rgba(80,0,80,0.2)',
                    vignetteColor: 'transparent'
                },
                SLEEPING: {
                    name: 'Deep Winter',
                    accent: '#93B4DC',
                    eyeColor: '#5A7A9E',
                    eyeGlow: '#4A6A8E',
                    moon: '#94a3b8',
                    bgOverlay: 'rgba(15,23,42,0.4)',
                    vignetteColor: 'transparent'
                }
            };

            const currentSeason = seasons[state];

            /* Bug positions calibrated to the ChatGPT image layout
               Each bug has organic shape data: bodyColor, wingColor, glowColor, and SVG shape type */
            /* Bug positions with 3D depth (zDepth in px) — bugs closer to viewer appear larger
               and shift more with mouse parallax, creating a layered 3D ecosystem */
            const bugs = [
                { id: 'docs', label: 'Documents', type: 'Moth', icon: <FileText size={12}/>, x: '15%', y: '28%', zDepth: 40,
                  bodyColor: '#8B7355', wingColor: '#D4C5A9', glowColor: '#E8DCC8', shape: 'moth' },
                { id: 'py', label: 'Python', type: 'Beetle', icon: <Code size={12}/>, x: '12%', y: '42%', zDepth: -20,
                  bodyColor: '#2E7D32', wingColor: '#4CAF50', glowColor: '#66BB6A', shape: 'beetle' },
                { id: 'cfg', label: 'Config', type: 'Firefly', icon: <Settings size={12}/>, x: '78%', y: '25%', zDepth: 60,
                  bodyColor: '#1B1B1B', wingColor: '#333', glowColor: '#FFEB3B', shape: 'firefly' },
                { id: 'data', label: 'Data', type: 'Dragonfly', icon: <Database size={12}/>, x: '22%', y: '55%', zDepth: 30,
                  bodyColor: '#1565C0', wingColor: '#90CAF9', glowColor: '#42A5F5', shape: 'dragonfly' },
                { id: 'sec', label: 'Security', type: 'Spider', icon: <Shield size={12}/>, x: '38%', y: '62%', zDepth: -30, hanging: true,
                  bodyColor: '#1A1A1A', wingColor: '#333', glowColor: '#CE93D8', shape: 'spider' },
                { id: 'pkg', label: 'Package', type: 'Caterpillar', icon: <Archive size={12}/>, x: '25%', y: '70%', zDepth: -10,
                  bodyColor: '#558B2F', wingColor: '#8BC34A', glowColor: '#AED581', shape: 'caterpillar' },
                { id: 'design', label: 'Design', type: 'Butterfly', icon: <PenTool size={12}/>, x: '85%', y: '18%', zDepth: 80, hover: true,
                  bodyColor: '#1A1A1A', wingColor: '#EC407A', glowColor: '#F48FB1', shape: 'butterfly' },
                { id: 'db', label: 'Database', type: 'Pill Bug', icon: <Database size={12}/>, x: '48%', y: '75%', zDepth: -40,
                  bodyColor: '#455A64', wingColor: '#78909C', glowColor: '#90A4AE', shape: 'pillbug' },
                { id: 'test', label: 'Test', type: 'Lightning Bug', icon: <Activity size={12}/>, x: '70%', y: '45%', zDepth: 50,
                  bodyColor: '#1B1B1B', wingColor: '#333', glowColor: '#76FF03', shape: 'firefly' },
                { id: 'log', label: 'Log', type: 'Ant', icon: <Clipboard size={12}/>, x: '30%', y: '35%', zDepth: 10,
                  bodyColor: '#3E2723', wingColor: '#5D4037', glowColor: '#8D6E63', shape: 'ant' },
                { id: 'tools', label: 'Tools', type: 'Carpenter Bee', icon: <Wrench size={12}/>, x: '60%', y: '32%', zDepth: 70, hover: true,
                  bodyColor: '#1A1A1A', wingColor: '#FFC107', glowColor: '#FFD54F', shape: 'bee' },
                { id: 'docs2', label: 'Docs', type: 'Bookworm', icon: <BookOpen size={12}/>, x: '55%', y: '20%', zDepth: 55, hover: true,
                  bodyColor: '#4FD1C5', wingColor: '#80DEEA', glowColor: '#B2EBF2', shape: 'worm' },
            ];

            /* SVG insect shapes that render organic bodies */
            const InsectBody = ({ bug, accent }) => {
                const s = bug.shape;
                const glow = bug.glowColor;
                const body = bug.bodyColor;
                const wing = bug.wingColor;

                if (s === 'moth') return (
                    <svg width="52" height="44" viewBox="0 0 52 44" className="drop-shadow-lg">
                        <defs><filter id={`glow-${bug.id}`}><feGaussianBlur stdDeviation="2.5" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
                        <ellipse cx="18" cy="18" rx="14" ry="10" fill={wing} opacity="0.5" transform="rotate(-20,18,18)" filter={`url(#glow-${bug.id})`}/>
                        <ellipse cx="34" cy="18" rx="14" ry="10" fill={wing} opacity="0.5" transform="rotate(20,34,18)" filter={`url(#glow-${bug.id})`}/>
                        <ellipse cx="26" cy="24" rx="4" ry="10" fill={body}/>
                        <line x1="22" y1="14" x2="16" y2="6" stroke={body} strokeWidth="1" opacity="0.6"/>
                        <line x1="30" y1="14" x2="36" y2="6" stroke={body} strokeWidth="1" opacity="0.6"/>
                        <circle cx="16" cy="5" r="1.5" fill={glow} opacity="0.8"/>
                        <circle cx="36" cy="5" r="1.5" fill={glow} opacity="0.8"/>
                    </svg>
                );
                if (s === 'beetle') return (
                    <svg width="40" height="48" viewBox="0 0 40 48" className="drop-shadow-lg">
                        <defs><filter id={`glow-${bug.id}`}><feGaussianBlur stdDeviation="2" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
                        <ellipse cx="20" cy="28" rx="12" ry="16" fill={body} filter={`url(#glow-${bug.id})`}/>
                        <line x1="20" y1="12" x2="20" y2="44" stroke={wing} strokeWidth="0.8" opacity="0.4"/>
                        <ellipse cx="20" cy="12" rx="8" ry="6" fill={body} opacity="0.9"/>
                        <circle cx="16" cy="10" r="2" fill={glow} opacity="0.9"/>
                        <circle cx="24" cy="10" r="2" fill={glow} opacity="0.9"/>
                        <line x1="8" y1="22" x2="2" y2="18" stroke={body} strokeWidth="1.2"/>
                        <line x1="32" y1="22" x2="38" y2="18" stroke={body} strokeWidth="1.2"/>
                        <line x1="7" y1="28" x2="1" y2="30" stroke={body} strokeWidth="1.2"/>
                        <line x1="33" y1="28" x2="39" y2="30" stroke={body} strokeWidth="1.2"/>
                    </svg>
                );
                if (s === 'firefly') return (
                    <svg width="36" height="44" viewBox="0 0 36 44" className="drop-shadow-lg">
                        <defs>
                            <filter id={`glow-${bug.id}`}><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
                            <radialGradient id={`light-${bug.id}`}><stop offset="0%" stopColor={glow} stopOpacity="1"/><stop offset="100%" stopColor={glow} stopOpacity="0"/></radialGradient>
                        </defs>
                        <ellipse cx="18" cy="18" rx="6" ry="8" fill={body}/>
                        <ellipse cx="18" cy="32" rx="5" ry="7" fill={glow} opacity="0.9" filter={`url(#glow-${bug.id})`}/>
                        <circle cx="18" cy="32" r="10" fill={`url(#light-${bug.id})`} opacity="0.5"/>
                        <ellipse cx="12" cy="16" rx="6" ry="3" fill={wing} opacity="0.25" transform="rotate(-30,12,16)"/>
                        <ellipse cx="24" cy="16" rx="6" ry="3" fill={wing} opacity="0.25" transform="rotate(30,24,16)"/>
                    </svg>
                );
                if (s === 'dragonfly') return (
                    <svg width="64" height="40" viewBox="0 0 64 40" className="drop-shadow-lg">
                        <defs><filter id={`glow-${bug.id}`}><feGaussianBlur stdDeviation="2" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
                        <ellipse cx="16" cy="14" rx="12" ry="5" fill={wing} opacity="0.3" transform="rotate(-15,16,14)" filter={`url(#glow-${bug.id})`}/>
                        <ellipse cx="48" cy="14" rx="12" ry="5" fill={wing} opacity="0.3" transform="rotate(15,48,14)" filter={`url(#glow-${bug.id})`}/>
                        <ellipse cx="18" cy="24" rx="10" ry="4" fill={wing} opacity="0.25" transform="rotate(-10,18,24)"/>
                        <ellipse cx="46" cy="24" rx="10" ry="4" fill={wing} opacity="0.25" transform="rotate(10,46,24)"/>
                        <ellipse cx="32" cy="20" rx="4" ry="14" fill={body}/>
                        <circle cx="32" cy="8" r="4" fill={body}/>
                        <circle cx="30" cy="7" r="1.5" fill={glow} opacity="0.9"/>
                        <circle cx="34" cy="7" r="1.5" fill={glow} opacity="0.9"/>
                    </svg>
                );
                if (s === 'spider') return (
                    <svg width="44" height="44" viewBox="0 0 44 44" className="drop-shadow-lg">
                        <defs><filter id={`glow-${bug.id}`}><feGaussianBlur stdDeviation="2" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
                        <circle cx="22" cy="22" r="8" fill={body} filter={`url(#glow-${bug.id})`}/>
                        <circle cx="22" cy="12" r="5" fill={body}/>
                        {[[-35,0],[-25,0],[-15,0],[-5,0],[5,0],[15,0],[25,0],[35,0]].map((a,i) => (
                            <line key={i} x1="22" y1="22" x2={22 + Math.cos((i*45-90)*Math.PI/180)*18} y2={22 + Math.sin((i*45-90)*Math.PI/180)*18} stroke={body} strokeWidth="1.5" opacity="0.7"/>
                        ))}
                        <circle cx="19" cy="10" r="1.5" fill={glow} opacity="0.8"/>
                        <circle cx="25" cy="10" r="1.5" fill={glow} opacity="0.8"/>
                    </svg>
                );
                if (s === 'caterpillar') return (
                    <svg width="56" height="28" viewBox="0 0 56 28" className="drop-shadow-lg">
                        <defs><filter id={`glow-${bug.id}`}><feGaussianBlur stdDeviation="1.5" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
                        {[0,1,2,3,4,5].map(i => (
                            <circle key={i} cx={8 + i*8} cy={16} r={i===0 ? 6 : 5} fill={i%2===0 ? body : wing} opacity={0.8} filter={i===0 ? `url(#glow-${bug.id})` : undefined}/>
                        ))}
                        <circle cx="6" cy="12" r="1.5" fill={glow} opacity="0.9"/>
                        <circle cx="12" cy="12" r="1.5" fill={glow} opacity="0.9"/>
                        <line x1="4" y1="10" x2="0" y2="4" stroke={body} strokeWidth="1"/>
                        <line x1="10" y1="10" x2="14" y2="4" stroke={body} strokeWidth="1"/>
                    </svg>
                );
                if (s === 'butterfly') return (
                    <svg width="56" height="48" viewBox="0 0 56 48" className="drop-shadow-lg">
                        <defs><filter id={`glow-${bug.id}`}><feGaussianBlur stdDeviation="2.5" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
                        <ellipse cx="14" cy="16" rx="12" ry="10" fill={wing} opacity="0.55" filter={`url(#glow-${bug.id})`}/>
                        <ellipse cx="42" cy="16" rx="12" ry="10" fill={wing} opacity="0.55" filter={`url(#glow-${bug.id})`}/>
                        <ellipse cx="16" cy="30" rx="8" ry="10" fill={wing} opacity="0.4"/>
                        <ellipse cx="40" cy="30" rx="8" ry="10" fill={wing} opacity="0.4"/>
                        <ellipse cx="28" cy="24" rx="3" ry="14" fill={body}/>
                        <circle cx="14" cy="16" r="3" fill={glow} opacity="0.3"/>
                        <circle cx="42" cy="16" r="3" fill={glow} opacity="0.3"/>
                        <line x1="26" y1="10" x2="20" y2="2" stroke={body} strokeWidth="0.8"/>
                        <line x1="30" y1="10" x2="36" y2="2" stroke={body} strokeWidth="0.8"/>
                        <circle cx="20" cy="2" r="1.2" fill={glow} opacity="0.7"/>
                        <circle cx="36" cy="2" r="1.2" fill={glow} opacity="0.7"/>
                    </svg>
                );
                if (s === 'pillbug') return (
                    <svg width="40" height="32" viewBox="0 0 40 32" className="drop-shadow-lg">
                        <defs><filter id={`glow-${bug.id}`}><feGaussianBlur stdDeviation="1.5" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
                        <ellipse cx="20" cy="18" rx="14" ry="10" fill={body} filter={`url(#glow-${bug.id})`}/>
                        {[0,1,2,3,4].map(i => (
                            <path key={i} d={`M ${8+i*6} 10 Q ${8+i*6} 18 ${8+i*6} 26`} stroke={wing} strokeWidth="1.5" fill="none" opacity="0.4"/>
                        ))}
                        <circle cx="12" cy="12" r="1.5" fill={glow} opacity="0.7"/>
                        <circle cx="20" cy="12" r="1.5" fill={glow} opacity="0.7"/>
                    </svg>
                );
                if (s === 'ant') return (
                    <svg width="44" height="32" viewBox="0 0 44 32" className="drop-shadow-lg">
                        <defs><filter id={`glow-${bug.id}`}><feGaussianBlur stdDeviation="1.5" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
                        <ellipse cx="10" cy="18" rx="6" ry="5" fill={body} filter={`url(#glow-${bug.id})`}/>
                        <ellipse cx="22" cy="18" rx="5" ry="4" fill={body}/>
                        <ellipse cx="34" cy="18" rx="7" ry="5" fill={body}/>
                        <line x1="4" y1="14" x2="0" y2="8" stroke={body} strokeWidth="1"/>
                        <line x1="10" y1="14" x2="14" y2="8" stroke={body} strokeWidth="1"/>
                        <circle cx="0" cy="7" r="1" fill={glow} opacity="0.8"/>
                        <circle cx="14" cy="7" r="1" fill={glow} opacity="0.8"/>
                        {[0,1,2].map(i => (<React.Fragment key={i}>
                            <line x1={16+i*6} y1="22" x2={12+i*6} y2="30" stroke={body} strokeWidth="1" opacity="0.6"/>
                            <line x1={20+i*6} y1="22" x2={24+i*6} y2="30" stroke={body} strokeWidth="1" opacity="0.6"/>
                        </React.Fragment>))}
                    </svg>
                );
                if (s === 'bee') return (
                    <svg width="44" height="44" viewBox="0 0 44 44" className="drop-shadow-lg">
                        <defs><filter id={`glow-${bug.id}`}><feGaussianBlur stdDeviation="2" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
                        <ellipse cx="14" cy="16" rx="8" ry="4" fill="rgba(255,255,255,0.15)" transform="rotate(-30,14,16)"/>
                        <ellipse cx="30" cy="16" rx="8" ry="4" fill="rgba(255,255,255,0.15)" transform="rotate(30,30,16)"/>
                        <ellipse cx="22" cy="26" rx="8" ry="12" fill={body} filter={`url(#glow-${bug.id})`}/>
                        {[0,1,2].map(i => (
                            <rect key={i} x="14" y={20+i*5} width="16" height="2.5" fill={wing} rx="1" opacity="0.7"/>
                        ))}
                        <circle cx="22" cy="14" r="5" fill={body}/>
                        <circle cx="19" cy="12" r="1.5" fill={glow} opacity="0.9"/>
                        <circle cx="25" cy="12" r="1.5" fill={glow} opacity="0.9"/>
                    </svg>
                );
                /* worm / bookworm */
                return (
                    <svg width="48" height="28" viewBox="0 0 48 28" className="drop-shadow-lg">
                        <defs><filter id={`glow-${bug.id}`}><feGaussianBlur stdDeviation="2" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
                        <path d="M 4 16 Q 12 8 20 16 Q 28 24 36 16 Q 42 10 46 14" stroke={body} strokeWidth="6" fill="none" strokeLinecap="round" filter={`url(#glow-${bug.id})`}/>
                        <circle cx="46" cy="14" r="4" fill={body}/>
                        <circle cx="44" cy="12" r="1.2" fill={glow} opacity="0.9"/>
                        <circle cx="48" cy="12" r="1.2" fill={glow} opacity="0.9"/>
                    </svg>
                );
            };

            const [parallax, setParallax] = useState({ x: 0, y: 0 });

            /* Keyboard state switching (1-5) */
            useEffect(() => {
                const handleKey = (e) => {
                    const stateMap = { '1': 'IDLE', '2': 'SCANNING', '3': 'ALERT', '4': 'SUCCESS', '5': 'SLEEPING' };
                    if (stateMap[e.key]) setState(stateMap[e.key]);
                };
                window.addEventListener('keydown', handleKey);
                return () => window.removeEventListener('keydown', handleKey);
            }, []);

            const handleMouseMove = (e) => {
                setMousePos({ x: e.clientX, y: e.clientY });
                /* Parallax offset: normalized -1 to 1 from center */
                const px = (e.clientX / window.innerWidth - 0.5) * 2;
                const py = (e.clientY / window.innerHeight - 0.5) * 2;
                setParallax({ x: px, y: py });
            };

            const catchBug = (bug) => {
                if (catching) return;
                setCatching(bug);
                setInteractionStep(1);
                setTimeout(() => setInteractionStep(2), 400);
                setTimeout(() => setInteractionStep(3), 800);
                setTimeout(() => setInteractionStep(4), 1200);
                setTimeout(() => setInteractionStep(5), 1800);
                setTimeout(() => {

                                                    height: `${3-i}px`,
                                                    backgroundColor: bug.glowColor,
                                                    left: `${-8 - i*6}px`,
                                                    top: `${(i-1)*3}px`,
                                                    opacity: 0.3 - i*0.1,
                                                    filter: `blur(${1+i}px)`
                                                }}
                                            />
                                        ))}
                                    </div>

                                    {/* Hover label with organic connector line */}
                                    <div className="absolute left-[60%] top-1/2 -translate-y-1/2 opacity-0 group-hover:opacity-100 transition-all duration-400 pointer-events-none">
                                        <div className="flex items-center">
                                            <div className="w-12 h-[1px] origin-left" style={{ background: `linear-gradient(to right, ${bug.glowColor}66, ${bug.glowColor}22)` }} />
                                            <div className="ml-1 w-1.5 h-1.5 rounded-full" style={{ backgroundColor: bug.glowColor, boxShadow: `0 0 4px ${bug.glowColor}` }} />
                                            <div className="ml-2 text-[10px] text-white/90 font-bold whitespace-nowrap tracking-widest uppercase"
                                                style={{ textShadow: `0 1px 6px rgba(0,0,0,0.95), 0 0 10px ${bug.glowColor}33` }}>
                                                {bug.label}
                                                <div className="text-[8px] font-normal tracking-wider" style={{ color: bug.glowColor, opacity: 0.7 }}>{bug.type}</div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            );
                        })}
                    </div>

                    {/* LAYER 5: HUD OVERLAY */}
                    <div className="absolute inset-0 pointer-events-none z-[50] p-8 flex flex-col justify-between">
                        {/* Top Row */}
                        <div className="flex justify-between items-start w-full">
                            <div className="text-white/40 text-[11px] tracking-[0.2em] uppercase leading-relaxed" style={{ textShadow: '0 2px 8px rgba(0,0,0,0.9)' }}>
                                <div>Files: <span className="text-white/80">1,287</span></div>
                                <div>Scanned: <span style={{ color: currentSeason.accent }}>100%</span></div>
                            </div>

                            <div className="flex flex-col items-center">
                                <div className="h-[1px] w-32 bg-gradient-to-r from-transparent via-white/30 to-transparent mb-2" />
                                <div className="text-[10px] font-black text-white/90 tracking-[0.4em] uppercase" style={{ textShadow: '0 2px 8px rgba(0,0,0,0.9)' }}>
                                    <span className="text-white/50 mr-2">SYS.</span>{state}
                                </div>
                                <div className="text-[9px] text-white/40 tracking-widest mt-1 uppercase">{currentSeason.name}</div>
                                <div className="h-[1px] w-16 bg-gradient-to-r from-transparent via-white/30 to-transparent mt-2" />
                            </div>

                            <div className="text-white/40 text-[11px] tracking-[0.2em] uppercase text-right leading-relaxed" style={{ textShadow: '0 2px 8px rgba(0,0,0,0.9)' }}>
                                <div>Sync: <span className="text-white/80">Active</span></div>
                                <div>Uplink: <span style={{ color: currentSeason.accent }}>Stable</span></div>
                            </div>
                        </div>

                        {/* Bottom Row */}
                        <div className="flex justify-between items-end w-full pb-20">
                            <div className="text-white/40 text-[11px] tracking-[0.2em] uppercase" style={{ textShadow: '0 2px 8px rgba(0,0,0,0.9)' }}>
                                Threats: <span className={state === 'ALERT' ? 'text-[#EF4444]' : 'text-white/80'}>
                                    {state === 'ALERT' ? '1 DETECTED' : '0'}
                                </span>
                            </div>

                            <div className="text-white/20 text-[10px] tracking-[0.3em] uppercase" style={{ textShadow: '0 2px 8px rgba(0,0,0,0.9)' }}>
                                [1-5] Seasons | [Click] Catch | [Move] Explore 3D
                            </div>

                            <div className="text-white/40 text-[11px] tracking-[0.2em] uppercase text-right" style={{ textShadow: '0 2px 8px rgba(0,0,0,0.9)' }}>
                                Mode: <span className="text-white/80">Monitoring</span>
                            </div>
                        </div>
                    </div>

                    {/* LAYER 6: STATE TRANSITION STRIP */}
                    <div className="absolute bottom-0 left-0 right-0 h-20 bg-black/80 backdrop-blur-xl border-t border-white/10 flex items-center justify-center gap-4 px-8 z-[50]">
                        {Object.keys(seasons).map((s) => (
                            <button
                                key={s}
                                onClick={() => setState(s)}
                                className={`relative w-40 h-12 rounded overflow-hidden border transition-all duration-300 cursor-pointer
                                    ${state === s ? 'border-white/80 scale-105 shadow-[0_0_15px_rgba(255,255,255,0.2)]' : 'border-white/10 hover:border-white/40'}
                                `}
                            >
                                <div className="absolute inset-0 bg-gradient-to-b from-gray-900 to-gray-800 opacity-90" />
                                <div className="absolute inset-0 flex items-center justify-center z-10 text-[9px] font-bold text-white/80 tracking-widest uppercase hover:text-white transition-colors pointer-events-none">
                                    {seasons[s].name}
                                </div>
                                {state === s && (
                                    <div className="absolute bottom-0 left-0 h-[2px] w-full" style={{ backgroundColor: seasons[s].accent }} />
                                )}
                            </button>
                        ))}
                    </div>

                    {/* Custom Cursor */}
                    <div
                        className="fixed pointer-events-none z-[1000] mix-blend-difference"
                        style={{ left: mousePos.x, top: mousePos.y, transform: 'translate(-50%, -50%)' }}
                    >
                        <div className="w-5 h-5 border border-white/60 rounded-full flex items-center justify-center">
                            <div className="w-[3px] h-[3px] bg-white rounded-full" />
                        </div>
                    </div>
                </div>
            );
        };

        // Lightning component for Alert state
        const AlertLightning = () => {
            const [flash, setFlash] = useState(false);

            useEffect(() => {
                const interval = setInterval(() => {
                    setFlash(true);
                    setTimeout(() => setFlash(false), 80);
                    setTimeout(() => setFlash(true), 150);
                    setTimeout(() => setFlash(false), 200);
                }, 3000 + Math.random() * 2000);
                return () => clearInterval(interval);
            }, []);

            return flash ? (
                <div className="absolute inset-0 bg-white/40 pointer-events-none z-[2]" />
            ) : null;
        };

        ReactDOM.render(<OwlWatcher />, document.getElementById('root'));
    </script>
</body>
</html>

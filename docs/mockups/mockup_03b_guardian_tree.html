<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1920, initial-scale=1.0">
    <title>Mockup 03b: Guardian Tree - OwlWatcher</title>
    <style>
        /* ===================================================================
           MOCKUP 03b: THE GUARDIAN TREE
           Concepts: Ancient Guardian Tree + Digital Nature Fusion + Seasonal States
           Developer: Marcus Daley
           Date: 2026-02-25

           An ancient oak tree with circuit-bark fills the viewport.
           The owl perches on a central branch. File icons are glowing
           bugs crawling along branches. The entire world shifts seasons
           with owl state changes.
           =================================================================== */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', sans-serif;
            width: 1920px;
            height: 1080px;
            overflow: hidden;
            position: relative;
            cursor: crosshair;
            transition: background 2s ease;
        }

        /* ===================================================================
           SKY / ATMOSPHERE - Changes with season
           =================================================================== */
        .sky {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0;
            transition: background 2s ease;
        }

        /* Default: Summer Night (idle) */
        .sky {
            background: linear-gradient(180deg,
                #0a0e2e 0%,
                #0f1a3a 30%,
                #162040 50%,
                #1a2a35 70%,
                #0d1f1a 100%);
        }

        /* Moon */
        .moon {
            position: absolute;
            top: 60px;
            right: 200px;
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: radial-gradient(circle at 40% 40%, #fef3c7 0%, #fbbf24 40%, #f59e0b 100%);
            box-shadow: 0 0 80px rgba(251, 191, 36, 0.4), 0 0 200px rgba(251, 191, 36, 0.15);
            z-index: 5;
            transition: all 2s ease;
        }

        /* Stars */
        .stars {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 60%;
            background-image:
                radial-gradient(1px 1px at 15% 8%, rgba(255,255,255,0.8), transparent),
                radial-gradient(1px 1px at 32% 15%, rgba(255,255,255,0.6), transparent),
                radial-gradient(1.5px 1.5px at 55% 5%, rgba(255,255,255,0.9), transparent),
                radial-gradient(1px 1px at 72% 18%, rgba(255,255,255,0.5), transparent),
                radial-gradient(1px 1px at 88% 12%, rgba(255,255,255,0.7), transparent),
                radial-gradient(1px 1px at 45% 22%, rgba(79, 209, 197, 0.6), transparent),
                radial-gradient(1px 1px at 8% 25%, rgba(255,255,255,0.4), transparent),
                radial-gradient(1.5px 1.5px at 65% 3%, rgba(251,191,36,0.5), transparent);
            z-index: 2;
            animation: twinkle 4s ease-in-out infinite;
            transition: opacity 2s ease;
        }
        @keyframes twinkle {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        /* Fog / atmosphere layers */
        .fog {
            position: absolute;
            bottom: 0; left: 0; width: 200%; height: 300px;
            z-index: 15;
            opacity: 0.4;
            animation: fog-drift 30s linear infinite;
            transition: all 2s ease;
        }
        .fog-1 {
            background: linear-gradient(90deg, transparent, rgba(79,209,197,0.08) 30%, rgba(147,51,234,0.05) 60%, transparent);
            animation-duration: 30s;
        }
        .fog-2 {
            background: linear-gradient(90deg, transparent, rgba(100,150,120,0.1) 40%, rgba(79,209,197,0.06) 70%, transparent);
            animation-duration: 45s;
            animation-delay: -15s;
            bottom: 50px;
        }
        @keyframes fog-drift {
            from { transform: translateX(0); }
            to { transform: translateX(-50%); }
        }

        /* ===================================================================
           THE TREE - Trunk, branches, roots
           =================================================================== */
        .tree-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10;
        }

        /* Main trunk */
        .trunk {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 280px;
            height: 750px;
            background: linear-gradient(90deg,
                #1a1208 0%,
                #2d1f0e 15%,
                #3d2a14 30%,
                #4a3318 50%,
                #3d2a14 70%,
                #2d1f0e 85%,
                #1a1208 100%);
            border-radius: 40px 40px 80px 80px;
            z-index: 12;
        }

        /* Circuit pattern overlay on bark */
        .circuit-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            border-radius: inherit;
            background:
                repeating-linear-gradient(0deg,
                    transparent 0px, transparent 40px,
                    rgba(79,209,197,0.08) 40px, rgba(79,209,197,0.08) 41px),
                repeating-linear-gradient(90deg,
                    transparent 0px, transparent 60px,
                    rgba(79,209,197,0.06) 60px, rgba(79,209,197,0.06) 61px);
            animation: circuit-pulse 4s ease-in-out infinite;
            z-index: 1;
            transition: all 2s ease;
        }
        @keyframes circuit-pulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 0.8; }
        }

        /* Data sap flowing through trunk */
        .data-sap {
            position: absolute;
            width: 3px;
            background: linear-gradient(to bottom, rgba(79,209,197,0.8), transparent);
            z-index: 2;
            animation: sap-flow 3s ease-in infinite;
            border-radius: 3px;
            transition: background 2s ease;
        }
        @keyframes sap-flow {
            0% { height: 0; opacity: 0; top: 10%; }
            30% { opacity: 1; }
            100% { height: 200px; opacity: 0; top: 80%; }
        }

        /* Branches */
        .branch {
            position: absolute;
            height: 20px;
            border-radius: 20px;
            z-index: 11;
            transition: background 2s ease;
        }
        .branch-bark {
            background: linear-gradient(180deg, #3d2a14 0%, #2d1f0e 100%);
        }

        /* Branch positions - creating the canopy structure */
        .branch-1 { top: 220px; left: 50%; width: 500px; transform: rotate(-15deg); transform-origin: left center; }
        .branch-2 { top: 180px; right: 50%; width: 480px; transform: rotate(12deg); transform-origin: right center; }
        .branch-3 { top: 320px; left: 52%; width: 600px; transform: rotate(-8deg); transform-origin: left center; }
        .branch-4 { top: 290px; right: 52%; width: 550px; transform: rotate(10deg); transform-origin: right center; }
        .branch-5 { top: 420px; left: 48%; width: 400px; transform: rotate(-20deg); transform-origin: left center; }
        .branch-6 { top: 400px; right: 48%; width: 420px; transform: rotate(18deg); transform-origin: right center; }
        /* Owl's perch branch - thicker, center */
        .branch-perch {
            top: 380px;
            left: 50%;
            transform: translateX(-50%);
            width: 350px;
            height: 30px;
            border-radius: 30px;
            background: linear-gradient(180deg, #4a3318 0%, #2d1f0e 100%);
            z-index: 30;
        }

        /* Roots */
        .root {
            position: absolute;
            bottom: 0;
            height: 25px;
            border-radius: 25px;
            background: linear-gradient(180deg, #2d1f0e, #1a1208);
            z-index: 11;
        }
        .root-1 { left: calc(50% - 300px); width: 350px; transform: rotate(5deg); }
        .root-2 { left: calc(50% + 50px); width: 320px; transform: rotate(-8deg); }
        .root-3 { left: calc(50% - 200px); width: 250px; bottom: 30px; transform: rotate(12deg); }

        /* ===================================================================
           CANOPY / LEAVES - Layered foliage
           =================================================================== */
        .canopy {
            position: absolute;
            border-radius: 50%;
            z-index: 8;
            transition: all 2s ease;
        }
        .canopy-1 {
            top: 30px; left: 50%; transform: translateX(-50%);
            width: 900px; height: 400px;
            background: radial-gradient(ellipse, rgba(34,80,50,0.7) 0%, rgba(20,60,35,0.4) 60%, transparent 100%);
        }
        .canopy-2 {
            top: 80px; left: 45%; transform: translateX(-50%);
            width: 700px; height: 350px;
            background: radial-gradient(ellipse, rgba(40,90,55,0.6) 0%, rgba(25,70,40,0.3) 60%, transparent 100%);
        }
        .canopy-3 {
            top: 60px; left: 55%; transform: translateX(-50%);
            width: 750px; height: 320px;
            background: radial-gradient(ellipse, rgba(30,85,48,0.5) 0%, rgba(18,55,32,0.3) 60%, transparent 100%);
        }

        /* Leaf particles (firefly-like ambient) */
        .leaf-particle {
            position: absolute;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 20;
            animation: leaf-drift linear infinite;
            transition: background 2s ease;
        }
        @keyframes leaf-drift {
            0% { transform: translate(0, 0) rotate(0deg); opacity: 0; }
            10% { opacity: 0.8; }
            90% { opacity: 0.8; }
            100% { transform: translate(var(--drift-x), var(--drift-y)) rotate(360deg); opacity: 0; }
        }

        /* ===================================================================
           OWL - Perched on branch
           =================================================================== */
        .owl-perch {
            position: absolute;
            top: 260px;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            height: 200px;
            z-index: 50;
            cursor: pointer;
        }
        .owl-body {
            position: absolute;
            top: 0; left: 50%;
            transform: translateX(-50%);
            font-size: 160px;
            filter: drop-shadow(0 0 40px rgba(79,209,197,0.6));
            animation: owl-idle-breathe 5s ease-in-out infinite;
            transition: filter 2s ease;
        }
        @keyframes owl-idle-breathe {
            0%, 100% { transform: translateX(-50%) scale(1) translateY(0); }
            50% { transform: translateX(-50%) scale(1.03) translateY(-5px); }
        }

        /* Owl eye glow */
        .owl-eyes {
            position: absolute;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 20px;
            z-index: 51;
            pointer-events: none;
        }
        .eye-glow {
            position: absolute;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(79,209,197,1) 0%, rgba(79,209,197,0) 70%);
            animation: eye-blink 6s ease-in-out infinite;
            transition: background 2s ease;
        }
        .eye-glow.left { left: 8px; }
        .eye-glow.right { right: 8px; }
        @keyframes eye-blink {
            0%, 45%, 55%, 100% { transform: scaleY(1); }
            50% { transform: scaleY(0.1); }
        }

        /* ===================================================================
           BUGS (FILE ICONS) - Crawl along branches
           =================================================================== */
        .bug {
            position: absolute;
            width: 70px;
            height: 70px;
            z-index: 40;
            cursor: pointer;
            pointer-events: auto;
            transition: all 0.3s ease;
        }
        .bug-body {
            width: 100%;
            height: 100%;
            background: rgba(26,35,50,0.85);
            border: 2px solid rgba(79,209,197,0.5);
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(5px);
            box-shadow: 0 0 20px rgba(79,209,197,0.3);
            transition: all 0.3s ease;
        }
        .bug:hover .bug-body {
            transform: scale(1.3);
            border-color: rgba(79,209,197,1);
            box-shadow: 0 0 40px rgba(79,209,197,0.8);
        }
        .bug-icon { font-size: 28px; }
        .bug-label {
            font-size: 8px;
            color: rgba(255,255,255,0.8);
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 0.5px;
            margin-top: 2px;
        }

        /* Bug wing shimmer */
        .bug-wings {
            position: absolute;
            top: -5px; left: -5px;
            width: calc(100% + 10px);
            height: calc(100% + 10px);
            border-radius: 50%;
            background: conic-gradient(from 0deg, transparent, rgba(79,209,197,0.15), transparent, rgba(147,51,234,0.1), transparent);
            animation: wing-shimmer 2s linear infinite;
            pointer-events: none;
        }
        @keyframes wing-shimmer {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Bug glow trail */
        .bug-trail {
            position: absolute;
            top: 50%; left: 50%;
            width: 4px; height: 4px;
            background: rgba(79,209,197,0.6);
            border-radius: 50%;
            pointer-events: none;
            z-index: 35;
            animation: trail-fade 1.5s ease-out forwards;
        }
        @keyframes trail-fade {
            from { transform: translate(-50%,-50%) scale(1); opacity: 0.8; }
            to { transform: translate(-50%,-50%) scale(0); opacity: 0; }
        }

        /* Bug crawl animation along branch paths */
        .bug.crawling {
            animation: bug-crawl var(--crawl-duration) linear infinite;
        }
        @keyframes bug-crawl {
            from { offset-distance: 0%; }
            to { offset-distance: 100%; }
        }

        /* Branch path crawling (using transform for compatibility) */
        .bug-path-right {
            animation: crawl-right var(--crawl-duration) ease-in-out infinite alternate;
        }
        @keyframes crawl-right {
            0% { transform: translateX(0) translateY(0); }
            25% { transform: translateX(80px) translateY(-12px); }
            50% { transform: translateX(160px) translateY(-8px); }
            75% { transform: translateX(240px) translateY(-15px); }
            100% { transform: translateX(320px) translateY(-5px); }
        }
        .bug-path-left {
            animation: crawl-left var(--crawl-duration) ease-in-out infinite alternate;
        }
        @keyframes crawl-left {
            0% { transform: translateX(0) translateY(0); }
            25% { transform: translateX(-80px) translateY(-10px); }
            50% { transform: translateX(-160px) translateY(-14px); }
            75% { transform: translateX(-240px) translateY(-6px); }
            100% { transform: translateX(-320px) translateY(-12px); }
        }
        .bug-path-hover {
            animation: bug-hover-float var(--crawl-duration) ease-in-out infinite;
        }
        @keyframes bug-hover-float {
            0%, 100% { transform: translate(0, 0); }
            25% { transform: translate(30px, -20px); }
            50% { transform: translate(-20px, -40px); }
            75% { transform: translate(-30px, -15px); }
        }

        /* ===================================================================
           OWL CATCHING ANIMATION
           =================================================================== */
        .owl-perch.catching .owl-body {
            animation: none !important;
        }
        @keyframes owl-swoop-to-bug {
            0% { transform: translateX(-50%) scale(1) rotate(0deg); }
            25% { transform: translate(var(--swoop-x), var(--swoop-y)) scale(1.2) rotate(var(--swoop-rot)); }
            35% { transform: translate(var(--swoop-x), calc(var(--swoop-y) + 25px)) scale(1.25) rotate(var(--swoop-rot)); }
            40% { transform: translate(var(--swoop-x), var(--swoop-y)) scale(1.2) rotate(var(--swoop-rot)); }
            45% { transform: translate(var(--swoop-x), calc(var(--swoop-y) + 25px)) scale(1.25) rotate(var(--swoop-rot)); }
            50% { transform: translate(var(--swoop-x), var(--swoop-y)) scale(1.2) rotate(var(--swoop-rot)); }
            55% { transform: translate(var(--swoop-x), calc(var(--swoop-y) + 25px)) scale(1.25) rotate(var(--swoop-rot)); }
            65% { transform: translate(var(--swoop-x), var(--swoop-y)) scale(1.15) rotate(var(--swoop-rot)); }
            100% { transform: translateX(-50%) scale(1) rotate(0deg); }
        }

        .bug.being-caught .bug-body {
            animation: bug-caught 0.6s cubic-bezier(0.68,-0.55,0.265,1.55) forwards !important;
        }
        @keyframes bug-caught {
            0% { transform: scale(1); opacity: 1; }
            40% { transform: scale(0.6); opacity: 0.8; }
            100% { transform: scale(0) translate(var(--catch-dir-x), var(--catch-dir-y)); opacity: 0; }
        }

        /* Catch burst */
        .catch-burst {
            position: absolute;
            width: 80px; height: 80px;
            background: radial-gradient(circle, rgba(79,209,197,0.9) 0%, transparent 70%);
            border-radius: 50%;
            transform: translate(-50%,-50%) scale(0);
            pointer-events: none;
            z-index: 60;
            animation: burst-pop 0.5s ease-out forwards;
        }
        @keyframes burst-pop {
            0% { transform: translate(-50%,-50%) scale(0); opacity: 1; }
            100% { transform: translate(-50%,-50%) scale(3); opacity: 0; }
        }

        /* Peck sparks */
        .peck-spark {
            position: absolute;
            width: 4px; height: 4px;
            background: #4fd1c5;
            border-radius: 50%;
            pointer-events: none;
            z-index: 65;
            animation: spark-fly 0.4s ease-out forwards;
        }
        @keyframes spark-fly {
            0% { transform: translate(0,0) scale(1); opacity: 1; }
            100% { transform: translate(var(--spark-x), var(--spark-y)) scale(0); opacity: 0; }
        }

        /* ===================================================================
           SEASONAL STATE STYLES
           =================================================================== */

        /* SCANNING: Autumn - orange/amber leaves, fog, searchlight eyes */
        body.state-scanning .sky {
            background: linear-gradient(180deg, #1a0e05 0%, #2d1a08 30%, #3d2510 50%, #2a1f12 70%, #1a150d 100%);
        }
        body.state-scanning .canopy-1 { background: radial-gradient(ellipse, rgba(180,90,20,0.6) 0%, rgba(140,70,15,0.3) 60%, transparent 100%); }
        body.state-scanning .canopy-2 { background: radial-gradient(ellipse, rgba(200,100,25,0.5) 0%, rgba(160,80,20,0.25) 60%, transparent 100%); }
        body.state-scanning .canopy-3 { background: radial-gradient(ellipse, rgba(170,85,18,0.5) 0%, rgba(130,65,12,0.3) 60%, transparent 100%); }
        body.state-scanning .moon { box-shadow: 0 0 60px rgba(251,191,36,0.6), 0 0 150px rgba(251,146,60,0.3); }
        body.state-scanning .owl-body { filter: drop-shadow(0 0 50px rgba(251,191,36,0.7)); }
        body.state-scanning .eye-glow { background: radial-gradient(circle, rgba(251,191,36,1) 0%, rgba(251,191,36,0) 70%); }
        body.state-scanning .circuit-overlay { background: repeating-linear-gradient(0deg, transparent 0px, transparent 40px, rgba(251,191,36,0.1) 40px, rgba(251,191,36,0.1) 41px), repeating-linear-gradient(90deg, transparent 0px, transparent 60px, rgba(251,191,36,0.08) 60px, rgba(251,191,36,0.08) 61px); }
        body.state-scanning .data-sap { background: linear-gradient(to bottom, rgba(251,191,36,0.8), transparent); }
        body.state-scanning .fog-1 { background: linear-gradient(90deg, transparent, rgba(251,191,36,0.06) 30%, rgba(200,100,25,0.05) 60%, transparent); opacity: 0.6; }

        /* Scan beam from owl eyes */
        .scan-beam-eye {
            position: absolute;
            top: 310px; left: 50%;
            width: 800px; height: 3px;
            background: linear-gradient(90deg, rgba(251,191,36,0.9) 0%, transparent 100%);
            transform-origin: left center;
            animation: eye-beam-sweep 4s ease-in-out infinite;
            pointer-events: none;
            z-index: 45;
            display: none;
            filter: blur(1px);
            box-shadow: 0 0 15px rgba(251,191,36,0.6);
        }
        @keyframes eye-beam-sweep {
            0%, 100% { transform: rotate(-40deg); }
            50% { transform: rotate(40deg); }
        }
        body.state-scanning .scan-beam-eye { display: block; }

        /* Falling leaves for scanning/autumn */
        .falling-leaf {
            position: absolute;
            font-size: 18px;
            pointer-events: none;
            z-index: 25;
            animation: leaf-fall linear forwards;
        }
        @keyframes leaf-fall {
            0% { transform: translateY(-20px) rotate(0deg) translateX(0); opacity: 0; }
            10% { opacity: 1; }
            100% { transform: translateY(1100px) rotate(720deg) translateX(var(--leaf-sway)); opacity: 0; }
        }

        /* ALERT: Dead winter storm - bare branches, red lightning, bugs scatter */
        body.state-alert .sky {
            background: linear-gradient(180deg, #1a0505 0%, #2d0808 30%, #3d0a0a 50%, #1a0505 70%, #0a0202 100%);
        }
        body.state-alert .canopy-1,
        body.state-alert .canopy-2,
        body.state-alert .canopy-3 { opacity: 0.15; }
        body.state-alert .moon { background: radial-gradient(circle at 40% 40%, #fca5a5 0%, #ef4444 40%, #dc2626 100%); box-shadow: 0 0 80px rgba(239,68,68,0.6); }
        body.state-alert .stars { opacity: 0.2; }
        body.state-alert .owl-body { filter: drop-shadow(0 0 60px rgba(239,68,68,0.9)); animation: owl-alert-shake 0.3s ease-in-out infinite !important; }
        @keyframes owl-alert-shake {
            0%, 100% { transform: translateX(-50%) translateX(0) translateY(0); }
            25% { transform: translateX(-50%) translateX(-6px) translateY(3px); }
            75% { transform: translateX(-50%) translateX(6px) translateY(-3px); }
        }
        body.state-alert .eye-glow { background: radial-gradient(circle, rgba(239,68,68,1) 0%, rgba(239,68,68,0) 70%); animation: alert-eye-flash 0.4s ease-in-out infinite; }
        @keyframes alert-eye-flash {
            0%, 100% { opacity: 1; transform: scaleY(1); }
            50% { opacity: 0.5; }
        }
        body.state-alert .circuit-overlay { background: repeating-linear-gradient(0deg, transparent 0px, transparent 40px, rgba(239,68,68,0.12) 40px, rgba(239,68,68,0.12) 41px), repeating-linear-gradient(90deg, transparent 0px, transparent 60px, rgba(239,68,68,0.1) 60px, rgba(239,68,68,0.1) 61px); }
        body.state-alert .data-sap { background: linear-gradient(to bottom, rgba(239,68,68,0.8), transparent); }

        /* Alert vignette */
        .alert-vignette {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(ellipse at center, transparent 40%, rgba(239,68,68,0.25) 100%);
            pointer-events: none;
            z-index: 70;
            display: none;
            animation: vignette-throb 0.8s ease-in-out infinite;
        }
        @keyframes vignette-throb {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }
        body.state-alert .alert-vignette { display: block; }

        /* Lightning flash */
        .lightning {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: white;
            pointer-events: none;
            z-index: 75;
            opacity: 0;
        }

        /* SUCCESS: Spring bloom - cherry blossoms, golden butterflies, vibrant green */
        body.state-success .sky {
            background: linear-gradient(180deg, #1a1040 0%, #2d1860 25%, #3d2575 40%, #4a2d80 55%, #1a2a35 100%);
        }
        body.state-success .canopy-1 { background: radial-gradient(ellipse, rgba(236,72,153,0.5) 0%, rgba(180,60,120,0.3) 40%, transparent 100%); }
        body.state-success .canopy-2 { background: radial-gradient(ellipse, rgba(244,114,182,0.4) 0%, rgba(200,80,140,0.2) 40%, transparent 100%); }
        body.state-success .canopy-3 { background: radial-gradient(ellipse, rgba(251,191,36,0.3) 0%, rgba(234,179,8,0.15) 40%, transparent 100%); }
        body.state-success .moon { background: radial-gradient(circle at 40% 40%, #fef3c7 0%, #fbbf24 40%, #f59e0b 100%); box-shadow: 0 0 100px rgba(251,191,36,0.7); }
        body.state-success .owl-body {
            filter: drop-shadow(0 0 60px rgba(251,191,36,0.9));
            animation: owl-success-bounce 1s cubic-bezier(0.34,1.56,0.64,1) infinite !important;
        }
        @keyframes owl-success-bounce {
            0%, 100% { transform: translateX(-50%) translateY(0) scale(1); }
            50% { transform: translateX(-50%) translateY(-25px) scale(1.08); }
        }
        body.state-success .eye-glow { background: radial-gradient(circle, rgba(251,191,36,1) 0%, rgba(251,191,36,0) 70%); }
        body.state-success .circuit-overlay { background: repeating-linear-gradient(0deg, transparent 0px, transparent 40px, rgba(251,191,36,0.12) 40px, rgba(251,191,36,0.12) 41px), repeating-linear-gradient(90deg, transparent 0px, transparent 60px, rgba(234,179,8,0.08) 60px, rgba(234,179,8,0.08) 61px); }

        /* Blossom petals */
        .blossom {
            position: absolute;
            width: 12px; height: 12px;
            border-radius: 50% 0 50% 0;
            pointer-events: none;
            z-index: 25;
            animation: blossom-fall linear forwards;
        }
        @keyframes blossom-fall {
            0% { transform: translateY(-30px) rotate(0deg); opacity: 0; }
            10% { opacity: 0.9; }
            100% { transform: translateY(1100px) rotate(1080deg) translateX(var(--petal-sway)); opacity: 0; }
        }

        /* SLEEPING: Deep winter snow - everything still, soft blue, snow falling */
        body.state-sleeping .sky {
            background: linear-gradient(180deg, #0a1025 0%, #101830 30%, #1a2545 50%, #0f1a30 70%, #080e1a 100%);
        }
        body.state-sleeping .canopy-1 { background: radial-gradient(ellipse, rgba(100,120,160,0.4) 0%, rgba(80,100,140,0.2) 60%, transparent 100%); }
        body.state-sleeping .canopy-2 { background: radial-gradient(ellipse, rgba(120,140,180,0.3) 0%, rgba(90,110,150,0.15) 60%, transparent 100%); }
        body.state-sleeping .canopy-3 { opacity: 0.3; }
        body.state-sleeping .moon { opacity: 0.4; box-shadow: 0 0 40px rgba(147,180,220,0.3); }
        body.state-sleeping .stars { opacity: 0.3; }
        body.state-sleeping .owl-body {
            filter: drop-shadow(0 0 20px rgba(147,180,220,0.3));
            animation: owl-sleep-drift 8s ease-in-out infinite !important;
            opacity: 0.7;
        }
        @keyframes owl-sleep-drift {
            0%, 100% { transform: translateX(-50%) translateY(0) scale(0.95) rotate(0deg); }
            50% { transform: translateX(-50%) translateY(8px) scale(0.93) rotate(2deg); }
        }
        body.state-sleeping .eye-glow { opacity: 0.2; }
        body.state-sleeping .circuit-overlay { opacity: 0.15 !important; }
        body.state-sleeping .bug { opacity: 0.3; }

        /* Snow particles */
        .snowflake {
            position: absolute;
            width: 6px; height: 6px;
            background: rgba(200,220,255,0.8);
            border-radius: 50%;
            pointer-events: none;
            z-index: 25;
            animation: snow-fall linear forwards;
        }
        @keyframes snow-fall {
            0% { transform: translateY(-20px) translateX(0); opacity: 0; }
            10% { opacity: 0.8; }
            100% { transform: translateY(1100px) translateX(var(--snow-drift)); opacity: 0.3; }
        }

        /* Sleep Z's */
        .sleep-z {
            position: absolute;
            font-size: 28px;
            color: rgba(147,180,220,0.6);
            pointer-events: none;
            z-index: 55;
            animation: z-float-up 3s ease-out forwards;
            text-shadow: 0 0 10px rgba(147,180,220,0.4);
        }
        @keyframes z-float-up {
            0% { transform: translateY(0) scale(0.5) rotate(0deg); opacity: 0; }
            20% { opacity: 0.7; }
            100% { transform: translateY(-160px) translateX(50px) scale(1.3) rotate(15deg); opacity: 0; }
        }

        /* ===================================================================
           HUD / STATE BADGE
           =================================================================== */
        .state-badge {
            position: fixed;
            top: 25px; left: 50%;
            transform: translateX(-50%);
            padding: 10px 30px;
            background: rgba(10,14,39,0.85);
            border: 2px solid rgba(79,209,197,0.6);
            border-radius: 25px;
            font-size: 14px;
            font-weight: 600;
            color: #4fd1c5;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-family: 'Courier New', monospace;
            z-index: 500;
            backdrop-filter: blur(10px);
            transition: all 0.5s ease;
        }
        .state-badge.scanning { border-color: rgba(251,191,36,0.8); color: #fbbf24; }
        .state-badge.alert { border-color: rgba(239,68,68,0.8); color: #ef4444; }
        .state-badge.success { border-color: rgba(236,72,153,0.8); color: #ec4899; }
        .state-badge.sleeping { border-color: rgba(147,180,220,0.5); color: #93b4dc; opacity: 0.7; }

        /* Controls hint */
        .controls-hint {
            position: fixed;
            bottom: 30px; left: 50%;
            transform: translateX(-50%);
            font-size: 12px;
            color: rgba(255,255,255,0.4);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-family: 'Courier New', monospace;
            z-index: 500;
            animation: hint-pulse 3s ease-in-out infinite;
        }
        @keyframes hint-pulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 0.8; }
        }

        /* Right-click context menu */
        .context-menu {
            position: absolute;
            width: 220px;
            background: rgba(10,14,39,0.95);
            border: 1px solid rgba(79,209,197,0.5);
            border-radius: 10px;
            backdrop-filter: blur(15px);
            z-index: 600;
            overflow: hidden;
            display: none;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
        }
        .context-menu-item {
            padding: 12px 18px;
            font-size: 13px;
            color: rgba(255,255,255,0.9);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.2s ease;
        }
        .context-menu-item:hover {
            background: rgba(79,209,197,0.2);
            color: #4fd1c5;
        }
        .context-menu-divider {
            height: 1px;
            background: rgba(79,209,197,0.2);
        }

        /* Bioluminescent mushrooms on trunk */
        .mushroom {
            position: absolute;
            font-size: 24px;
            z-index: 13;
            animation: mushroom-glow 3s ease-in-out infinite;
            filter: drop-shadow(0 0 10px rgba(79,209,197,0.6));
            transition: filter 2s ease;
        }
        @keyframes mushroom-glow {
            0%, 100% { filter: drop-shadow(0 0 10px rgba(79,209,197,0.6)) brightness(1); }
            50% { filter: drop-shadow(0 0 20px rgba(79,209,197,0.9)) brightness(1.3); }
        }
    </style>
</head>
<body>

    <div class="sky">

            <div class="data-sap" style="left: 30%; animation-delay: 0s;"></div>

        <!-- Branches -->
        <div class="branch branch-bark branch-1"></div>

    <!-- Scanning beam from owl eyes -->

    <!-- Bugs (file icons) crawling on branches -->
    <div class="bug bug-path-right" style="top: 205px; left: calc(50% + 40px); --crawl-duration: 12s;" data-name="Doc">

    <div class="bug bug-path-right" style="top: 305px; left: calc(50% + 50px); --crawl-duration: 16s;" data-name="Config">

    </div>
    <div class="bug bug-path-left" style="top: 278px; left: calc(50% - 80px); --crawl-duration: 13s;" data-name="Data">
        <div class="bug-wings"></div>
        <div class="bug-body"><div class="bug-icon">🦗</div><div class="bug-label">Data</div></div>

    <div class="bug bug-path-right" style="top: 406px; left: calc(50% + 30px); --crawl-duration: 15s;" data-name="Security">

    <div class="bug bug-path-left" style="top: 388px; left: calc(50% - 60px); --crawl-duration: 11s;" data-name="Package">

        <div class="bug-body"><div class="bug-icon">🐛</div><div class="bug-label">Package</div></div>

    <div class="bug bug-path-hover" style="top: 150px; left: calc(50% + 200px); --crawl-duration: 10s;" data-name="Design">
        <div class="bug-wings"></div>
        <div class="bug-body"><div class="bug-icon">🦋</div><div class="bug-label">Design</div></div>
    </div>
    <div class="bug bug-path-hover" style="top: 250px; left: calc(50% - 350px); --crawl-duration: 9s;" data-name="Database">
        <div class="bug-wings"></div>
        <div class="bug-body"><div class="bug-icon">🪲</div><div class="bug-label">Database</div></div>
    </div>
    <div class="bug bug-path-right" style="top: 340px; left: calc(50% + 100px); --crawl-duration: 17s;" data-name="Test">
        <div class="bug-wings"></div>
        <div class="bug-body"><div class="bug-icon">⚡</div><div class="bug-label">Test</div></div>
    </div>
    <div class="bug bug-path-left" style="top: 240px; left: calc(50% - 130px); --crawl-duration: 18s;" data-name="Log">
        <div class="bug-wings"></div>
        <div class="bug-body"><div class="bug-icon">🐜</div><div class="bug-label">Log</div></div>
    </div>
    <div class="bug bug-path-hover" style="top: 180px; left: calc(50% - 280px); --crawl-duration: 11s;" data-name="Tools">
        <div class="bug-wings"></div>
        <div class="bug-body"><div class="bug-icon">🐝</div><div class="bug-label">Tools</div></div>
    </div>
    <div class="bug bug-path-hover" style="top: 350px; left: calc(50% + 300px); --crawl-duration: 12s;" data-name="Docs">
        <div class="bug-wings"></div>
        <div class="bug-body"><div class="bug-icon">🪱</div><div class="bug-label">Docs</div></div>
    </div>

    <!-- Alert vignette -->
    <div class="alert-vignette"></div>

    <!-- Lightning flash overlay -->
    <div class="lightning" id="lightning"></div>

    <!-- State badge -->
    <div class="state-badge" id="stateBadge">IDLE ・ SUMMER NIGHT</div>

    <!-- Controls hint -->
    <div class="controls-hint">
        1: IDLE ・ 2: SCANNING ・ 3: ALERT ・ 4: SUCCESS ・ 5: SLEEPING ・ CLICK OWL TO CYCLE ・ CLICK BUG: OWL CATCHES
    </div>

    <!-- Context menu -->
    <div class="context-menu" id="contextMenu">
        <div class="context-menu-item" data-action="open">📂 Open</div>
        <div class="context-menu-item" data-action="sync">🔄 Sync Now</div>
        <div class="context-menu-item" data-action="details">📋 Details</div>
        <div class="context-menu-divider"></div>
        <div class="context-menu-item" data-action="history">📜 History</div>
        <div class="context-menu-item" data-action="pin">📌 Pin to Branch</div>
    </div>

    <script>
        /* ===================================================================
           GUARDIAN TREE - STATE MACHINE + INTERACTIONS
           Developer: Marcus Daley
           Date: 2026-02-25
           =================================================================== */

        const owlPerch = document.getElementById('owlPerch');
        const owlBody = document.getElementById('owlBody');
        const stateBadge = document.getElementById('stateBadge');
        const lightning = document.getElementById('lightning');
        const contextMenu = document.getElementById('contextMenu');

        const STATES = ['idle', 'scanning', 'alert', 'success', 'sleeping'];
        const STATE_LABELS = {
            idle: 'IDLE ・ SUMMER NIGHT',
            scanning: 'SCANNING ・ AUTUMN WATCH',
            alert: 'ALERT ・ WINTER STORM',
            success: 'SUCCESS ・ SPRING BLOOM',
            sleeping: 'SLEEPING ・ DEEP WINTER'
        };

        let currentState = 'idle';
        let stateIntervals = [];
        let isCatching = false;

        // ===== STATE MACHINE =====
        function setOwlState(newState) {
            if (!STATES.includes(newState) || isCatching) return;

            // Clear previous state effects
            STATES.forEach(s => document.body.classList.remove(`state-${s}`));
            stateIntervals.forEach(id => clearInterval(id));
            stateIntervals = [];

            currentState = newState;
            document.body.classList.add(`state-${newState}`);

            // Update badge
            stateBadge.textContent = STATE_LABELS[newState];
            stateBadge.className = 'state-badge';
            if (newState !== 'idle') stateBadge.classList.add(newState);

            // State-specific particle effects
            switch(newState) {
                case 'scanning':
                    stateIntervals.push(setInterval(spawnFallingLeaf, 400));
                    break;
                case 'alert':
                    stateIntervals.push(setInterval(triggerLightning, 3000));
                    triggerLightning();
                    break;
                case 'success':
                    stateIntervals.push(setInterval(spawnBlossoms, 300));
                    break;
                case 'sleeping':
                    stateIntervals.push(setInterval(spawnSnow, 200));
                    stateIntervals.push(setInterval(spawnSleepZ, 2500));
                    spawnSleepZ();
                    break;
            }
        }

        function cycleState() {
            const idx = STATES.indexOf(currentState);
            setOwlState(STATES[(idx + 1) % STATES.length]);
        }

        // ===== SEASONAL PARTICLE EFFECTS =====
        function spawnFallingLeaf() {
            const leaves = ['🍂', '🍁', '🍃'];
            const leaf = document.createElement('div');
            leaf.className = 'falling-leaf';
            leaf.textContent = leaves[Math.floor(Math.random() * leaves.length)];
            leaf.style.left = `${Math.random() * 1920}px`;
            leaf.style.setProperty('--leaf-sway', `${-100 + Math.random() * 200}px`);
            leaf.style.animationDuration = `${4 + Math.random() * 4}s`;
            document.body.appendChild(leaf);
            setTimeout(() => leaf.remove(), 8000);
        }

        function triggerLightning() {
            lightning.style.opacity = '0.7';
            setTimeout(() => { lightning.style.opacity = '0'; }, 80);
            setTimeout(() => { lightning.style.opacity = '0.4'; }, 150);
            setTimeout(() => { lightning.style.opacity = '0'; }, 200);
        }

        function spawnBlossoms() {
            const colors = ['#f9a8d4', '#f472b6', '#ec4899', '#fbbf24', '#fde68a'];
            for (let i = 0; i < 3; i++) {
                const petal = document.createElement('div');
                petal.className = 'blossom';
                petal.style.left = `${200 + Math.random() * 1520}px`;
                petal.style.background = colors[Math.floor(Math.random() * colors.length)];
                petal.style.setProperty('--petal-sway', `${-80 + Math.random() * 160}px`);
                petal.style.animationDuration = `${3 + Math.random() * 4}s`;
                petal.style.width = `${8 + Math.random() * 10}px`;
                petal.style.height = `${8 + Math.random() * 10}px`;
                document.body.appendChild(petal);
                setTimeout(() => petal.remove(), 7000);
            }
        }

        function spawnSnow() {
            const flake = document.createElement('div');
            flake.className = 'snowflake';
            flake.style.left = `${Math.random() * 1920}px`;
            flake.style.setProperty('--snow-drift', `${-40 + Math.random() * 80}px`);
            flake.style.animationDuration = `${5 + Math.random() * 5}s`;
            flake.style.width = flake.style.height = `${3 + Math.random() * 5}px`;
            document.body.appendChild(flake);
            setTimeout(() => flake.remove(), 10000);
        }

        function spawnSleepZ() {
            const z = document.createElement('div');
            z.className = 'sleep-z';
            z.textContent = 'Z';
            z.style.left = `${960 + 80 + Math.random() * 60}px`;
            z.style.top = '240px';
            z.style.fontSize = `${22 + Math.random() * 20}px`;
            document.body.appendChild(z);
            setTimeout(() => z.remove(), 3500);
        }

        // ===== LEAF AMBIENT PARTICLES (always) =====
        function spawnLeafParticle() {
            const p = document.createElement('div');
            p.className = 'leaf-particle';
            p.style.left = `${300 + Math.random() * 1320}px`;
            p.style.top = `${50 + Math.random() * 400}px`;
            p.style.background = currentState === 'alert'
                ? 'rgba(239,68,68,0.6)'
                : currentState === 'success'
                ? 'rgba(236,72,153,0.6)'
                : 'rgba(79,209,197,0.6)';
            p.style.setProperty('--drift-x', `${-60 + Math.random() * 120}px`);
            p.style.setProperty('--drift-y', `${20 + Math.random() * 80}px`);
            p.style.animationDuration = `${4 + Math.random() * 6}s`;
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 10000);
        }
        setInterval(spawnLeafParticle, 800);

        // ===== BUG TRAIL PARTICLES =====
        document.querySelectorAll('.bug').forEach(bug => {
            setInterval(() => {
                if (bug.classList.contains('being-caught')) return;
                const rect = bug.getBoundingClientRect();
                const trail = document.createElement('div');
                trail.className = 'bug-trail';
                trail.style.left = `${rect.left + rect.width / 2}px`;
                trail.style.top = `${rect.top + rect.height / 2}px`;
                document.body.appendChild(trail);
                setTimeout(() => trail.remove(), 1500);
            }, 600);
        });

        // ===== OWL CATCHES BUG =====
        document.querySelectorAll('.bug').forEach(bug => {
            bug.addEventListener('click', (e) => {
                e.stopPropagation();
                if (isCatching) return;
                isCatching = true;

                const bugName = bug.dataset.name;
                const bugRect = bug.getBoundingClientRect();
                const bugCX = bugRect.left + bugRect.width / 2;
                const bugCY = bugRect.top + bugRect.height / 2;

                const owlRect = owlBody.getBoundingClientRect();
                const owlCX = owlRect.left + owlRect.width / 2;
                const owlCY = owlRect.top + owlRect.height / 2;

                const dx = bugCX - owlCX;
                const dy = bugCY - owlCY;
                const angle = Math.atan2(dy, dx) * (180 / Math.PI);

                owlBody.style.setProperty('--swoop-x', `calc(-50% + ${dx * 0.75}px)`);
                owlBody.style.setProperty('--swoop-y', `${dy * 0.75}px`);
                owlBody.style.setProperty('--swoop-rot', `${angle * 0.2}deg`);

                bug.querySelector('.bug-body').style.setProperty('--catch-dir-x', `${-dx * 0.4}px`);
                bug.querySelector('.bug-body').style.setProperty('--catch-dir-y', `${-dy * 0.4}px`);

                owlPerch.classList.add('catching');
                owlBody.style.animation = 'owl-swoop-to-bug 2s cubic-bezier(0.34,1.56,0.64,1) forwards';

                // Peck sparks at 35%, 45%, 55%
                [700, 900, 1100].forEach((t, i) => {
                    setTimeout(() => {
                        for (let s = 0; s < 4; s++) {
                            const spark = document.createElement('div');
                            spark.className = 'peck-spark';
                            spark.style.left = `${bugCX}px`;
                            spark.style.top = `${bugCY}px`;
                            spark.style.setProperty('--spark-x', `${-30 + Math.random() * 60}px`);
                            spark.style.setProperty('--spark-y', `${-30 + Math.random() * 60}px`);
                            document.body.appendChild(spark);
                            setTimeout(() => spark.remove(), 400);
                        }
                    }, t);
                });

                // Bug caught
                setTimeout(() => {
                    bug.classList.add('being-caught');
                    const burst = document.createElement('div');
                    burst.className = 'catch-burst';
                    burst.style.left = `${bugCX}px`;
                    burst.style.top = `${bugCY}px`;
                    document.body.appendChild(burst);
                    setTimeout(() => burst.remove(), 500);
                }, 900);

                // Reset
                setTimeout(() => {
                    owlPerch.classList.remove('catching');
                    owlBody.style.animation = '';
                    isCatching = false;

                    alert(`🦉 Owl caught the ${bugName} bug!\n\nOpening ${bugName} window...`);

                    setTimeout(() => {
                        bug.classList.remove('being-caught');
                        bug.querySelector('.bug-body').style.opacity = '1';
                        bug.querySelector('.bug-body').style.transform = '';
                    }, 500);
                }, 2000);
            });

            // Right-click context menu
            bug.addEventListener('contextmenu', (e) => {
                e.preventDefault();
                e.stopPropagation();
                contextMenu.dataset.target = bug.dataset.name;
                contextMenu.style.display = 'block';
                contextMenu.style.left = `${e.clientX}px`;
                contextMenu.style.top = `${e.clientY}px`;
            });
        });

        // Context menu actions
        document.addEventListener('click', () => { contextMenu.style.display = 'none'; });
        document.querySelectorAll('.context-menu-item').forEach(item => {
            item.addEventListener('click', (e) => {
                e.stopPropagation();
                const action = item.dataset.action;
                const name = contextMenu.dataset.target;
                contextMenu.style.display = 'none';
                alert(`${item.textContent.trim()} → ${name}`);
            });
        });

        // ===== OWL CLICK TO CYCLE STATE =====
        owlPerch.addEventListener('click', (e) => {
            if (isCatching) return;
            e.stopPropagation();
            cycleState();
        });

        // ===== KEYBOARD CONTROLS =====
        document.addEventListener('keydown', (e) => {
            switch(e.key) {
                case '1': setOwlState('idle'); break;
                case '2': setOwlState('scanning'); break;
                case '3': setOwlState('alert'); break;
                case '4': setOwlState('success'); break;
                case '5': setOwlState('sleeping'); break;
            }
        });
    </script>
</body>
</html>

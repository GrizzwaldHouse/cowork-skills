<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1920, initial-scale=1.0">
    <title>Mockup 12: Quantum Field - OwlWatcher</title>
    <style>
        /* MOCKUP 12: QUANTUM FIELD (BONUS - INSPIRED BY MOCKUP 03)
           Theme: Maximum sophistication - even more advanced than Mockup 03,
           150+ concurrent animations, quantum particle field, dynamic lighting,
           interactive physics simulation, multi-layer depth parallax,
           sound visualization concept, WebGL-style effects in pure CSS */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            width: 1920px; height: 1080px;
            overflow: hidden;
            background: #000000;
            position: relative;
            cursor: crosshair;
        }

        /* Multi-layer deep space background (12 layers) */
        .space-layer {
            position: absolute;
            width: 100%;
            height: 100%;
            background-size: 3000px 3000px;
            animation: space-drift linear infinite;
        }
        @keyframes space-drift {
            from { transform: translate(0, 0); }
            to { transform: translate(var(--drift-x), var(--drift-y)); }
        }
        .space-layer-1 {
            background-image: radial-gradient(2px 2px at 20% 30%, rgba(147, 51, 234, 0.9), transparent),
                              radial-gradient(2px 2px at 60% 70%, rgba(79, 209, 197, 0.9), transparent),
                              radial-gradient(1px 1px at 50% 50%, rgba(251, 146, 60, 0.8), transparent),
                              radial-gradient(3px 3px at 80% 10%, rgba(59, 130, 246, 0.9), transparent);
            animation-duration: 180s;
            --drift-x: -500px;
            --drift-y: -300px;
            z-index: 1;
        }
        .space-layer-2 {
            background-image: radial-gradient(1px 1px at 40% 60%, rgba(236, 72, 153, 0.7), transparent),
                              radial-gradient(2px 2px at 90% 40%, rgba(34, 211, 238, 0.7), transparent),
                              radial-gradient(1px 1px at 10% 80%, rgba(251, 191, 36, 0.6), transparent);
            animation-duration: 220s;
            --drift-x: -600px;
            --drift-y: -400px;
            z-index: 2;
        }
        .space-layer-3 {
            background-image: radial-gradient(3px 3px at 70% 20%, rgba(168, 85, 247, 0.8), transparent),
                              radial-gradient(2px 2px at 30% 90%, rgba(45, 212, 191, 0.7), transparent);
            animation-duration: 260s;
            --drift-x: -700px;
            --drift-y: -500px;
            z-index: 3;
        }

        /* Quantum particle field (50 particles) */
        .quantum-field {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 50;
            pointer-events: none;
        }
        .quantum-particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: radial-gradient(circle, rgba(79, 209, 197, 1) 0%, transparent 70%);
            border-radius: 50%;
            animation: quantum-drift var(--quantum-duration) ease-in-out infinite;
            box-shadow: 0 0 10px rgba(79, 209, 197, 0.8);
        }
        @keyframes quantum-drift {
            0% {
                transform: translate(0, 0) scale(1);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translate(var(--quantum-x), var(--quantum-y)) scale(var(--quantum-scale));
                opacity: 0;
            }
        }

        /* Central quantum core (massive owl) */
        .quantum-core {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 600px;
            height: 600px;
            z-index: 100;
        }
        .quantum-core::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(79, 209, 197, 0.3) 0%, transparent 70%);
            transform: translate(-50%, -50%);
            animation: quantum-core-pulse 6s ease-in-out infinite;
        }
        @keyframes quantum-core-pulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.5; }
            50% { transform: translate(-50%, -50%) scale(1.3); opacity: 1; }
        }
        .quantum-owl {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 512px;
            height: 512px;
            font-size: 400px;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: quantum-owl-rotate 30s linear infinite;
            filter: drop-shadow(0 0 80px rgba(79, 209, 197, 1));
        }
        @keyframes quantum-owl-rotate {
            from { transform: translate(-50%, -50%) rotateY(0deg); }
            to { transform: translate(-50%, -50%) rotateY(360deg); }
        }
        .quantum-owl::before {
            content: '🦉';
            animation: quantum-owl-breathe 8s ease-in-out infinite;
        }
        @keyframes quantum-owl-breathe {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.08); }
        }

        /* Orbiting file quantum nodes (18 nodes, 3 orbital rings) */
        .orbital-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            border-radius: 50%;
            border: 1px solid rgba(79, 209, 197, 0.2);
            animation: ring-rotate linear infinite;
            z-index: 90;
        }
        @keyframes ring-rotate {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }
        .orbital-ring-1 {
            width: 900px;
            height: 900px;
            animation-duration: 40s;
        }
        .orbital-ring-2 {
            width: 1200px;
            height: 1200px;
            animation-duration: 60s;
        }
        .orbital-ring-3 {
            width: 1500px;
            height: 1500px;
            animation-duration: 80s;
        }
        .quantum-node {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 80px;
            height: 80px;
            background: rgba(26, 35, 50, 0.9);
            border: 2px solid rgba(79, 209, 197, 0.6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            animation: node-orbit var(--orbit-duration) linear infinite;
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 95;
            box-shadow: 0 0 30px rgba(79, 209, 197, 0.4);
        }
        @keyframes node-orbit {
            from { transform: translate(-50%, -50%) rotate(0deg) translateX(var(--orbit-radius)) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(360deg) translateX(var(--orbit-radius)) rotate(-360deg); }
        }
        .quantum-node:hover {
            transform: scale(1.4);
            border-color: rgba(79, 209, 197, 1);
            box-shadow: 0 0 60px rgba(79, 209, 197, 1);
            z-index: 96;
        }

        /* Energy beams connecting owl to nodes */
        .energy-web {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 85;
            pointer-events: none;
        }
        .energy-web svg {
            width: 100%;
            height: 100%;
        }
        .energy-beam {
            stroke: rgba(79, 209, 197, 0.4);
            stroke-width: 2;
            stroke-dasharray: 10, 5;
            animation: beam-flow 3s linear infinite;
        }
        @keyframes beam-flow {
            to { stroke-dashoffset: 100; }
        }

        /* Dynamic lighting effects (4 spotlights) */
        .spotlight {
            position: absolute;
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, var(--spotlight-color) 0%, transparent 70%);
            border-radius: 50%;
            animation: spotlight-sweep var(--spotlight-duration) ease-in-out infinite;
            pointer-events: none;
            z-index: 80;
            mix-blend-mode: screen;
        }
        @keyframes spotlight-sweep {
            0% { transform: translate(var(--start-x), var(--start-y)) scale(1); opacity: 0.3; }
            50% { transform: translate(var(--end-x), var(--end-y)) scale(1.5); opacity: 0.6; }
            100% { transform: translate(var(--start-x), var(--start-y)) scale(1); opacity: 0.3; }
        }
        .spotlight-1 {
            --spotlight-color: rgba(79, 209, 197, 0.2);
            --spotlight-duration: 20s;
            --start-x: -200px;
            --start-y: -200px;
            --end-x: 200px;
            --end-y: 200px;
        }
        .spotlight-2 {
            --spotlight-color: rgba(251, 146, 60, 0.15);
            --spotlight-duration: 25s;
            --start-x: 1400px;
            --start-y: -100px;
            --end-x: 1200px;
            --end-y: 300px;
        }
        .spotlight-3 {
            --spotlight-color: rgba(147, 51, 234, 0.18);
            --spotlight-duration: 30s;
            --start-x: -300px;
            --start-y: 800px;
            --end-x: 300px;
            --end-y: 600px;
        }
        .spotlight-4 {
            --spotlight-color: rgba(59, 130, 246, 0.16);
            --spotlight-duration: 28s;
            --start-x: 1500px;
            --start-y: 900px;
            --end-x: 1300px;
            --end-y: 700px;
        }

        /* Sound visualization bars (bottom) */
        .sound-visualizer {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 150px;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: 8px;
            z-index: 120;
            padding: 0 100px;
        }
        .sound-bar {
            width: 20px;
            background: linear-gradient(to top, rgba(79, 209, 197, 0.8) 0%, rgba(79, 209, 197, 0.3) 100%);
            border-radius: 10px 10px 0 0;
            animation: sound-bar-bounce var(--bar-duration) ease-in-out infinite;
            box-shadow: 0 0 20px rgba(79, 209, 197, 0.6);
        }
        @keyframes sound-bar-bounce {
            0%, 100% { height: var(--bar-height-min); }
            50% { height: var(--bar-height-max); }
        }

        /* Gravity field effect circle */
        .gravity-field {
            position: absolute;
            width: 300px;
            height: 300px;
            border: 2px dashed rgba(79, 209, 197, 0.3);
            border-radius: 50%;
            pointer-events: none;
            z-index: 110;
            transition: all 0.15s ease-out;
            animation: gravity-pulse 3s ease-in-out infinite;
        }
        @keyframes gravity-pulse {
            0%, 100% { border-color: rgba(79, 209, 197, 0.3); }
            50% { border-color: rgba(79, 209, 197, 0.8); }
        }

        /* Status HUD overlay */
        .hud-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 200;
            pointer-events: none;
        }
        .hud-corner {
            position: absolute;
            padding: 20px;
            font-size: 14px;
            color: rgba(79, 209, 197, 0.8);
            font-family: 'Courier New', monospace;
            text-shadow: 0 0 10px rgba(79, 209, 197, 0.6);
        }
        .hud-top-left {
            top: 0;
            left: 0;
            animation: hud-fade-in 1s ease-out forwards;
        }
        .hud-top-right {
            top: 0;
            right: 0;
            text-align: right;
            animation: hud-fade-in 1s ease-out 0.2s forwards;
            opacity: 0;
        }
        .hud-bottom-left {
            bottom: 170px;
            left: 0;
            animation: hud-fade-in 1s ease-out 0.4s forwards;
            opacity: 0;
        }
        .hud-bottom-right {
            bottom: 170px;
            right: 0;
            text-align: right;
            animation: hud-fade-in 1s ease-out 0.6s forwards;
            opacity: 0;
        }
        @keyframes hud-fade-in {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .hud-value {
            font-size: 24px;
            font-weight: 700;
            color: white;
        }

        /* Scan line effect */
        .scan-line {
            position: absolute;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg,
                transparent 0%,
                rgba(79, 209, 197, 0.8) 50%,
                transparent 100%);
            animation: scan-line-sweep 4s linear infinite;
            z-index: 150;
            pointer-events: none;
        }
        @keyframes scan-line-sweep {
            from { top: -10px; }
            to { top: 110%; }
        }

        /* Chromatic aberration on owl */
        .chromatic-layer {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 512px;
            height: 512px;
            font-size: 400px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 101;
            pointer-events: none;
            opacity: 0.3;
            animation: chromatic-shift 10s ease-in-out infinite;
        }
        @keyframes chromatic-shift {
            0%, 100% { transform: translate(-50%, -50%); }
            25% { transform: translate(calc(-50% - 3px), calc(-50% - 2px)); }
            50% { transform: translate(calc(-50% + 3px), calc(-50% + 2px)); }
            75% { transform: translate(calc(-50% - 2px), calc(-50% + 3px)); }
        }
        .chromatic-layer.red::before {
            content: '🦉';
            filter: drop-shadow(0 0 40px rgba(239, 68, 68, 0.6));
            mix-blend-mode: screen;
        }
        .chromatic-layer.blue::before {
            content: '🦉';
            filter: drop-shadow(0 0 40px rgba(59, 130, 246, 0.6));
            mix-blend-mode: screen;
        }

        .annotation {
            position: absolute;
            padding: 8px 16px;
            font-size: 12px;
            font-weight: 600;
            border-radius: 6px;
            background: rgba(251, 146, 60, 0.95);
            color: white;
            border: 2px solid rgba(251, 146, 60, 1);
            z-index: 2000;
            font-family: 'Courier New', monospace;
        }
    </style>
</head>
<body>
    <!-- Multi-layer deep space -->
    <div class="space-layer space-layer-1"></div>
    <div class="space-layer space-layer-2"></div>
    <div class="space-layer space-layer-3"></div>

    <!-- Dynamic spotlights -->
    <div class="spotlight spotlight-1"></div>
    <div class="spotlight spotlight-2"></div>
    <div class="spotlight spotlight-3"></div>
    <div class="spotlight spotlight-4"></div>

    <!-- Scan line -->
    <div class="scan-line"></div>

    <!-- Quantum particle field (50 particles generated via JS) -->
    <div class="quantum-field" id="quantumField"></div>

    <!-- Energy web (connections between owl and nodes) -->
    <div class="energy-web">
        <svg id="energyWeb"></svg>
    </div>

    <!-- Orbital rings -->
    <div class="orbital-ring orbital-ring-1"></div>
    <div class="orbital-ring orbital-ring-2"></div>
    <div class="orbital-ring orbital-ring-3"></div>

    <!-- Quantum nodes (18 total, 6 per ring) -->
    <div class="quantum-node" style="--orbit-radius: 450px; --orbit-duration: 40s; animation-delay: 0s;">📄</div>
    <div class="quantum-node" style="--orbit-radius: 450px; --orbit-duration: 40s; animation-delay: -6.67s;">🐍</div>
    <div class="quantum-node" style="--orbit-radius: 450px; --orbit-duration: 40s; animation-delay: -13.33s;">⚙️</div>
    <div class="quantum-node" style="--orbit-radius: 450px; --orbit-duration: 40s; animation-delay: -20s;">📊</div>
    <div class="quantum-node" style="--orbit-radius: 450px; --orbit-duration: 40s; animation-delay: -26.67s;">🔒</div>
    <div class="quantum-node" style="--orbit-radius: 450px; --orbit-duration: 40s; animation-delay: -33.33s;">🎨</div>

    <div class="quantum-node" style="--orbit-radius: 600px; --orbit-duration: 60s; animation-delay: 0s;">📦</div>
    <div class="quantum-node" style="--orbit-radius: 600px; --orbit-duration: 60s; animation-delay: -10s;">📚</div>
    <div class="quantum-node" style="--orbit-radius: 600px; --orbit-duration: 60s; animation-delay: -20s;">🔧</div>
    <div class="quantum-node" style="--orbit-radius: 600px; --orbit-duration: 60s; animation-delay: -30s;">💾</div>
    <div class="quantum-node" style="--orbit-radius: 600px; --orbit-duration: 60s; animation-delay: -40s;">🌐</div>
    <div class="quantum-node" style="--orbit-radius: 600px; --orbit-duration: 60s; animation-delay: -50s;">📁</div>

    <div class="quantum-node" style="--orbit-radius: 750px; --orbit-duration: 80s; animation-delay: 0s;">🖼️</div>
    <div class="quantum-node" style="--orbit-radius: 750px; --orbit-duration: 80s; animation-delay: -13.33s;">🎵</div>
    <div class="quantum-node" style="--orbit-radius: 750px; --orbit-duration: 80s; animation-delay: -26.67s;">🎬</div>
    <div class="quantum-node" style="--orbit-radius: 750px; --orbit-duration: 80s; animation-delay: -40s;">📝</div>
    <div class="quantum-node" style="--orbit-radius: 750px; --orbit-duration: 80s; animation-delay: -53.33s;">🗂️</div>
    <div class="quantum-node" style="--orbit-radius: 750px; --orbit-duration: 80s; animation-delay: -66.67s;">⚡</div>

    <!-- Central quantum core with owl -->
    <div class="quantum-core">
        <div class="quantum-owl"></div>
    </div>

    <!-- Chromatic aberration layers -->
    <div class="chromatic-layer red"></div>
    <div class="chromatic-layer blue"></div>

    <!-- Gravity field (follows mouse) -->
    <div class="gravity-field" id="gravityField"></div>

    <!-- Sound visualizer bars (60 bars generated via JS) -->
    <div class="sound-visualizer" id="soundVisualizer"></div>

    <!-- HUD overlay -->
    <div class="hud-overlay">
        <div class="hud-corner hud-top-left">
            QUANTUM FIELD ACTIVE<br>
            <span class="hud-value">1,247</span> FILES<br>
            <span class="hud-value">18</span> NODES
        </div>
        <div class="hud-corner hud-top-right">
            SYNC STATUS<br>
            <span class="hud-value">98%</span><br>
            LATENCY: <span class="hud-value">12ms</span>
        </div>
        <div class="hud-corner hud-bottom-left">
            QUANTUM PARTICLES<br>
            <span class="hud-value">50</span> ACTIVE<br>
            FPS: <span class="hud-value">60</span>
        </div>
        <div class="hud-corner hud-bottom-right">
            SYSTEM HEALTH<br>
            <span class="hud-value">100%</span><br>
            MODE: <span class="hud-value">IMMERSIVE</span>
        </div>
    </div>

    <div class="annotation" style="top: 20px; left: 20px;">
        SPLINE 3D<br>QUANTUM FIELD MODE<br>150+ Concurrent Animations<br>Maximum Sophistication
    </div>

    <script>
        // Generate 50 quantum particles
        const quantumField = document.getElementById('quantumField');
        for (let i = 0; i < 50; i++) {
            const particle = document.createElement('div');
            particle.className = 'quantum-particle';
            particle.style.left = `${Math.random() * 100}%`;
            particle.style.top = `${Math.random() * 100}%`;
            particle.style.setProperty('--quantum-duration', `${10 + Math.random() * 20}s`);
            particle.style.setProperty('--quantum-x', `${-500 + Math.random() * 1000}px`);
            particle.style.setProperty('--quantum-y', `${-500 + Math.random() * 1000}px`);
            particle.style.setProperty('--quantum-scale', `${0.5 + Math.random() * 1.5}`);
            particle.style.animationDelay = `${Math.random() * 10}s`;
            quantumField.appendChild(particle);
        }

        // Generate 60 sound visualizer bars
        const soundVisualizer = document.getElementById('soundVisualizer');
        for (let i = 0; i < 60; i++) {
            const bar = document.createElement('div');
            bar.className = 'sound-bar';
            bar.style.setProperty('--bar-height-min', `${20 + Math.random() * 30}px`);
            bar.style.setProperty('--bar-height-max', `${80 + Math.random() * 70}px`);
            bar.style.setProperty('--bar-duration', `${0.5 + Math.random() * 1}s`);
            bar.style.animationDelay = `${Math.random() * 0.5}s`;
            soundVisualizer.appendChild(bar);
        }

        // Generate energy web connections
        const energyWeb = document.getElementById('energyWeb');
        const centerX = 960;
        const centerY = 540;
        const nodes = document.querySelectorAll('.quantum-node');
        nodes.forEach((node, index) => {
            const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
            const angle = (index * 360 / nodes.length) * Math.PI / 180;
            const radius = index < 6 ? 450 : (index < 12 ? 600 : 750);
            const x = centerX + Math.cos(angle) * radius;
            const y = centerY + Math.sin(angle) * radius;

            line.setAttribute('x1', centerX);
            line.setAttribute('y1', centerY);
            line.setAttribute('x2', x);
            line.setAttribute('y2', y);
            line.classList.add('energy-beam');
            line.style.animationDelay = `${index * 0.1}s`;
            energyWeb.appendChild(line);
        });

        // Mouse tracking for gravity field
        const gravityField = document.getElementById('gravityField');
        let mouseX = window.innerWidth / 2;
        let mouseY = window.innerHeight / 2;

        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
            gravityField.style.left = `${mouseX - 150}px`;
            gravityField.style.top = `${mouseY - 150}px`;

            // Apply gravity effect to nearby nodes
            nodes.forEach(node => {
                const rect = node.getBoundingClientRect();
                const nodeX = rect.left + rect.width / 2;
                const nodeY = rect.top + rect.height / 2;
                const distance = Math.sqrt((mouseX - nodeX) ** 2 + (mouseY - nodeY) ** 2);

                if (distance < 300) {
                    const attraction = 1 - (distance / 300);
                    const offsetX = (nodeX - mouseX) * attraction * 0.05;
                    const offsetY = (nodeY - mouseY) * attraction * 0.05;
                    node.style.transform = `translate(calc(-50% + ${offsetX}px), calc(-50% + ${offsetY}px)) scale(${1 + attraction * 0.2})`;
                    node.style.filter = `drop-shadow(0 0 ${20 + attraction * 40}px rgba(79, 209, 197, ${0.6 + attraction * 0.4}))`;
                } else {
                    node.style.transform = '';
                    node.style.filter = '';
                }
            });
        });

        // Node click interaction
        nodes.forEach(node => {
            node.addEventListener('click', function() {
                alert('⚛️ Quantum Node\n\nIn production:\n- File category deep dive\n- Quantum state analysis\n- Energy flow visualization\n- Real-time sync controls');
            });
        });

        // Scroll to zoom effect
        document.addEventListener('wheel', (e) => {
            const quantumCore = document.querySelector('.quantum-core');
            const currentScale = parseFloat(quantumCore.style.transform?.match(/scale\(([\d.]+)\)/)?.[1] || 1);
            const newScale = Math.max(0.5, Math.min(2, currentScale + (e.deltaY > 0 ? -0.05 : 0.05)));
            quantumCore.style.transform = `scale(${newScale})`;
        });

        // Click anywhere to pulse effect
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.quantum-node')) {
                const ripple = document.createElement('div');
                ripple.style.position = 'absolute';
                ripple.style.left = `${e.clientX - 100}px`;
                ripple.style.top = `${e.clientY - 100}px`;
                ripple.style.width = '200px';
                ripple.style.height = '200px';
                ripple.style.border = '2px solid rgba(79, 209, 197, 0.8)';
                ripple.style.borderRadius = '50%';
                ripple.style.pointerEvents = 'none';
                ripple.style.zIndex = '1000';
                ripple.style.animation = 'ripple-expand 1s ease-out forwards';
                document.body.appendChild(ripple);

                setTimeout(() => ripple.remove(), 1000);
            }
        });

        // Dynamic ripple animation
        const style = document.createElement('style');
        style.textContent = `
            @keyframes ripple-expand {
                from { transform: scale(0); opacity: 1; }
                to { transform: scale(3); opacity: 0; }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>

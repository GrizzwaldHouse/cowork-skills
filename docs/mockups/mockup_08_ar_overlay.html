<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1920, initial-scale=1.0">
    <title>Mockup 08: AR Overlay Concept - OwlWatcher</title>
    <style>
        /* MOCKUP 08: AR OVERLAY CONCEPT
           Theme: Transparent frameless overlay for desktop integration,
           holographic elements, minimal footprint, always-on-top aesthetics */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            width: 1920px; height: 1080px;
            overflow: hidden;
            background: transparent;
            position: relative;
        }

        /* Desktop wallpaper simulation */
        .desktop-wallpaper {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            z-index: -1;
        }

        /* Floating owl (no background) */
        .owl-ar {
            position: absolute;
            top: 20%;
            right: 5%;
            width: 128px;
            height: 128px;
            font-size: 96px;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: ar-float 4s ease-in-out infinite;
            z-index: 1000;
            filter: drop-shadow(0 0 20px rgba(79, 209, 197, 0.8));
            cursor: move;
        }
        @keyframes ar-float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }
        .owl-ar::before {
            content: '🦉';
        }

        /* Holographic file markers */
        .file-marker {
            position: absolute;
            width: 40px;
            height: 40px;
            background: radial-gradient(circle, rgba(79, 209, 197, 0.3) 0%, transparent 70%);
            border: 2px solid rgba(79, 209, 197, 0.6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            animation: marker-pulse 2s ease-in-out infinite;
            z-index: 900;
            cursor: pointer;
            backdrop-filter: blur(5px);
        }
        @keyframes marker-pulse {
            0%, 100% { transform: scale(1); box-shadow: 0 0 20px rgba(79, 209, 197, 0.4); }
            50% { transform: scale(1.1); box-shadow: 0 0 30px rgba(79, 209, 197, 0.8); }
        }
        .file-marker:nth-child(1) { top: 30%; left: 15%; animation-delay: 0s; }
        .file-marker:nth-child(2) { top: 50%; left: 25%; animation-delay: 0.3s; }
        .file-marker:nth-child(3) { top: 70%; left: 35%; animation-delay: 0.6s; }
        .file-marker:nth-child(4) { top: 40%; right: 30%; animation-delay: 0.9s; }

        /* Holographic moon toggle */
        .moon-ar {
            position: absolute;
            top: 5%;
            right: 3%;
            width: 64px;
            height: 64px;
            font-size: 48px;
            background: radial-gradient(circle, rgba(251, 146, 60, 0.2) 0%, transparent 70%);
            border: 2px solid rgba(251, 146, 60, 0.5);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 1000;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }
        .moon-ar:hover {
            transform: scale(1.2);
            border-color: rgba(251, 146, 60, 1);
            box-shadow: 0 0 30px rgba(251, 146, 60, 0.8);
        }

        /* Minimal status strip */
        .status-strip {
            position: absolute;
            bottom: 3%;
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 30px;
            background: rgba(26, 35, 50, 0.7);
            border: 1px solid rgba(79, 209, 197, 0.4);
            border-radius: 25px;
            backdrop-filter: blur(10px);
            z-index: 950;
            display: flex;
            gap: 20px;
            align-items: center;
        }
        .status-strip .stat {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.8);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .status-strip .stat span {
            color: #4fd1c5;
            font-weight: 600;
            margin-left: 5px;
        }

        /* Connection lines (AR style) */
        .connection-line {
            position: absolute;
            height: 1px;
            background: linear-gradient(90deg,
                rgba(79, 209, 197, 0.6) 0%,
                rgba(79, 209, 197, 0.3) 50%,
                rgba(79, 209, 197, 0.6) 100%);
            transform-origin: left center;
            animation: line-pulse 3s ease-in-out infinite;
            z-index: 850;
        }
        @keyframes line-pulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }

        .annotation {
            position: absolute;
            padding: 8px 16px;
            font-size: 12px;
            font-weight: 600;
            border-radius: 6px;
            background: rgba(251, 146, 60, 0.95);
            color: white;
            border: 2px solid rgba(251, 146, 60, 1);
            z-index: 2000;
            font-family: 'Courier New', monospace;
        }
    </style>
</head>
<body>
    <div class="desktop-wallpaper"></div>

    <div class="owl-ar" draggable="true"></div>
    <div class="moon-ar">🌙</div>

    <div class="file-marker">📄</div>
    <div class="file-marker">🐍</div>
    <div class="file-marker">⚙️</div>
    <div class="file-marker">📊</div>

    <div class="status-strip">
        <div class="stat">FILES<span>1,247</span></div>
        <div class="stat">SYNC<span>98%</span></div>
        <div class="stat">STATUS<span>ACTIVE</span></div>
    </div>

    <svg style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 850; pointer-events: none;">
        <line x1="17%" y1="30%" x2="85%" y2="23%" stroke="rgba(79, 209, 197, 0.4)" stroke-width="1" stroke-dasharray="5,5" />
        <line x1="27%" y1="50%" x2="85%" y2="23%" stroke="rgba(79, 209, 197, 0.4)" stroke-width="1" stroke-dasharray="5,5" />
        <line x1="37%" y1="70%" x2="85%" y2="23%" stroke="rgba(79, 209, 197, 0.4)" stroke-width="1" stroke-dasharray="5,5" />
    </svg>

    <div class="annotation" style="top: 20px; left: 20px;">
        SPLINE 3D<br>AR Overlay Mode<br>Transparent + Frameless
    </div>

    <script>
        // Drag owl
        const owl = document.querySelector('.owl-ar');
        owl.addEventListener('dragstart', (e) => {
            e.dataTransfer.effectAllowed = 'move';
        });

        // File markers
        document.querySelectorAll('.file-marker').forEach(marker => {
            marker.addEventListener('click', function() {
                alert('📍 AR File Marker\n\nIn production:\n- Shows file quick actions\n- Displays sync status overlay\n- Enables drag-to-folder\n- Minimal intrusion on desktop');
            });
        });
    </script>
</body>
</html>

; pytest.ini
; Developer: Marcus Daley
; Date: 2026-04-29
; Purpose: Test runner configuration for the AgenticOS suite. Enables
;          pytest-asyncio in auto mode so async tests and async
;          fixtures work without per-test markers everywhere.

[pytest]
testpaths = tests
asyncio_mode = auto
filterwarnings =
    ignore::DeprecationWarning
